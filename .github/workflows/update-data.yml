name: Update CWT + RTT data and deploy

# Daily refresh + deploy. Manual run via the Actions tab or `gh workflow run`.
on:
  schedule:
    - cron: "0 16 * * *"   # daily 16:00 UTC; only does work when NHS posts new files
  workflow_dispatch: {}      # manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Action versions kept on Node 24-capable majors (bumped ahead of the
      # 16 Jun 2026 Node 20 removal so a runner change can't break the refresh).
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - name: Run tests
        # Fail fast before any fetch/build/deploy if normalisation regresses
        # (e.g. the silent date-format collapse).
        run: |
          pip install pytest
          python -m pytest -q
      - name: Fetch new data and rebuild site (Cancer Waiting Times)
        run: python -m pipeline.run
      - name: Fetch new data and rebuild site (RTT)
        # Scrapes the RTT FY pages, fetches each month's Full CSV (raw zips are
        # gitignored + not persisted between runs, so every run re-fetches and picks
        # up NHS's latest revisions), then rebuilds site/rtt/data. The build runs BOTH
        # fail-loud gates (national SPN headline + sum-of-TFs == C_999) BEFORE writing
        # any file, so a bad fetch / definitional change fails this step and the deploy
        # never ships stale or partial RTT data.
        run: python -m pipeline_rtt.run
      - name: Commit refreshed data + manifest
        # Only commit when something OTHER than meta.json's built_at changed.
        # build_at churns every run, so committing unconditionally created a
        # daily no-op "Auto update CWT data" commit that every manual deploy then
        # had to rebase over. The freshly-built site/ (incl. meta.json) still
        # deploys from the working tree either way — we just don't churn git.
        run: |
          git config user.name "cwt-bot"
          git config user.email "cwt-bot@users.noreply.github.com"
          git add data/manifest.json data/processed site/cancer/data data_rtt/manifest.json site/rtt/data ods_classification.json
          if git diff --cached --quiet -- . ':(exclude)site/cancer/data/meta.json' ':(exclude)site/rtt/data/meta.json'; then
            echo "No data change (only meta.json built_at) — skipping no-op commit."
          else
            git commit -m "Auto update CWT data"
            git push
          fi
      - uses: actions/upload-pages-artifact@v5
        with: { path: site }
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: { name: github-pages }
    steps:
      - uses: actions/deploy-pages@v5
