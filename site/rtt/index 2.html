<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NHS RTT Waiting Times Dashboard</title>
<style>
  :root{
    --ink:#11202b; --ink-soft:#4a5a64; --line:#d7e0e3; --paper:#fbfcfc;
    --panel:#ffffff; --org:#0f7d8c; --org-muted:#6db0ba; --nat:#9aa7ad; --target:#c8881d;
    --good:#2f7d4f; --bad:#b23b3b; --grid:#eef3f4; --milestone:#b8a06a;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    line-height:1.5}
  .wrap{max-width:1040px;margin:0 auto;padding:32px 24px 80px}
  header{border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:8px}
  h1{font-size:30px;margin:0 0 2px;letter-spacing:-.01em}
  .sub{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:12px;
    text-transform:uppercase;letter-spacing:.14em;color:var(--ink-soft)}
  .controls{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;margin:22px 0 10px}
  label{display:block;font-family:ui-monospace,Menlo,monospace;font-size:11px;
    text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);margin-bottom:5px}
  select,input[type=search]{font:inherit;font-size:15px;padding:8px 10px;
    border:1px solid var(--line);border-radius:5px;background:#fff;min-width:360px}
  .orgname{font-size:13px;color:var(--ink-soft);display:inline-block;margin:0 0 0 12px;vertical-align:middle}
  .orgname:empty{display:none}
  .orgname b{color:var(--ink)}
  .typebtns{display:inline-flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;margin-bottom:8px}
  .typebtn{font:inherit;font-size:13.5px;padding:7px 15px;border:0;border-right:1px solid var(--line);
    background:#fff;cursor:pointer;color:var(--ink-soft)}
  .typebtn:last-child{border-right:0}
  .typebtn:hover{background:var(--grid)}
  .typebtn.active{background:var(--org);color:#fff}
  .orgbtnwrap{display:inline-block;vertical-align:middle}
  .orgbtnwrap .filterbtn{min-width:380px}
  .filterbtn[disabled],.orgbtnwrap[hidden]{display:none}
  .filterpanel .dropsearch{display:block;width:100%;min-width:0;font:inherit;font-size:14px;padding:7px 9px;
    margin-bottom:6px;border:1px solid var(--line);border-radius:5px}
  .note{background:#fff7e8;border:1px solid #f0dcae;border-left:3px solid var(--target);
    padding:10px 13px;font-size:13.5px;color:#6b561f;border-radius:0 4px 4px 0;margin:14px 0 22px}

  /* Three summary cards = the MEASURE switcher */
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:18px 0 22px}
  @media(max-width:780px){.cards{grid-template-columns:1fr}}
  .scard{background:var(--panel);border:1px solid var(--line);border-radius:8px;
    padding:13px 15px 11px;cursor:pointer;position:relative;
    transition:border-color .12s,box-shadow .12s;border-top:3px solid var(--line)}
  .scard:hover{border-color:#bcccd1}
  .scard.active{border-top-color:var(--org);box-shadow:0 1px 0 var(--org) inset, 0 2px 10px rgba(15,125,140,.10)}
  .scard h3{margin:0;font-size:14.5px;letter-spacing:-.005em}
  .scard .stdcode{font-family:ui-monospace,Menlo,monospace;font-size:10.5px;
    text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft)}
  .scard .figure{display:flex;align-items:baseline;gap:8px;margin:6px 0 2px}
  .scard .figure b{font-size:27px;font-weight:600;letter-spacing:-.02em;line-height:1;color:var(--ink);font-family:inherit}
  .scard .figure .vs{font-size:11px;color:var(--ink-soft);font-family:ui-monospace,Menlo,monospace}
  .scard .figure .vs.meets{color:var(--good)} .scard .figure .vs.under{color:var(--target)}
  .scard .spark{margin-top:6px}
  .scard .mon{font-family:ui-monospace,Menlo,monospace;font-size:10.5px;color:var(--ink-soft);margin-top:3px}
  .scard.nodata{opacity:.72}

  /* Big chart panel */
  .bigpanel{background:var(--panel);border:1px solid var(--line);border-radius:8px;
    padding:16px 18px 12px;position:relative}
  .bigpanel .ttl{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin:0 0 6px}
  .bigpanel .ttl h2{margin:0;font-size:18px;letter-spacing:-.01em}
  .bigpanel .ttl .tag{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--ink-soft)}
  .legend{display:flex;flex-wrap:wrap;align-items:center;gap:7px;
    font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--ink-soft);margin:2px 0 4px}
  .legend .lgitem{display:inline-flex;align-items:center;white-space:nowrap}
  .legend .lgsep{opacity:.4}
  .legend .lgbar{opacity:.4;padding:0 3px}
  .chartbox{position:relative}
  .chartbox svg{display:block;width:100%;height:auto}
  .pt{cursor:pointer}
  .tip{position:absolute;z-index:5;transform:translate(-50%,-118%);pointer-events:none;
    background:var(--ink);color:#fff;border-radius:6px;padding:7px 10px;
    font-family:ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.45;
    white-space:nowrap;box-shadow:0 3px 12px rgba(17,32,43,.25);display:none}
  .tip .pct{font-size:14px;font-weight:600}
  .tip .st{text-transform:uppercase;letter-spacing:.06em}
  .tip .prov{color:#f0c870} .tip .fin{color:#9be0b4}
  .tip::after{content:"";position:absolute;left:50%;top:100%;transform:translateX(-50%);
    border:5px solid transparent;border-top-color:var(--ink)}

  .filterbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:2px 0 8px}
  .filterbar .flabel{font-family:ui-monospace,Menlo,monospace;font-size:11px;
    text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft)}
  .fgrp{display:inline-flex;align-items:center;gap:8px}
  .fgrp[hidden]{display:none}
  .fdrop{position:relative}
  .filterbtn{font:inherit;font-size:14px;padding:6px 12px;border:1px solid var(--line);
    border-radius:5px;background:#fff;cursor:pointer;color:var(--ink);min-width:200px;text-align:left}
  .filterbtn:hover{border-color:#bcccd1}
  .filterbtn .caret{float:right;color:var(--ink-soft);margin-left:8px}
  .filterpanel{position:absolute;z-index:8;top:calc(100% + 4px);left:0;min-width:280px;max-width:340px;
    max-height:340px;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:6px;
    box-shadow:0 6px 22px rgba(17,32,43,.16);padding:6px}
  .filterpanel[hidden]{display:none}
  .fgroup{font-family:ui-monospace,Menlo,monospace;font-size:10px;text-transform:uppercase;
    letter-spacing:.1em;color:var(--ink-soft);padding:8px 8px 3px;border-top:1px solid var(--grid);margin-top:4px}
  .fgroup.first{border-top:0;margin-top:0}
  .fopt{display:block;width:100%;text-align:left;font:inherit;font-size:13.5px;padding:5px 8px;
    border:0;background:none;border-radius:4px;cursor:pointer;color:var(--ink)}
  .fopt:hover{background:var(--grid)}
  .fopt.active{background:rgba(15,125,140,.10);color:var(--org);font-weight:600}
  .slicehint{font-size:12px;color:var(--ink-soft)}
  .emptyslice{padding:40px 10px;text-align:center;color:var(--ink-soft);font-size:14px}

  footer{margin-top:42px;border-top:1px solid var(--line);padding-top:16px;font-size:12.5px;color:var(--ink-soft)}
  a{color:var(--org)}
  svg text{font-family:ui-monospace,Menlo,monospace}

  .charttools{margin-left:auto;display:inline-flex;gap:8px;align-items:center}
  .toolbtn{font:inherit;font-size:12.5px;padding:5px 11px;border:1px solid var(--line);
    border-radius:5px;background:#fff;cursor:pointer;color:var(--ink-soft);white-space:nowrap}
  .toolbtn:hover{border-color:#bcccd1;color:var(--ink)}
  .dlmenu{left:auto;right:0;min-width:160px}
  .dlmenu .fopt{font-size:13.5px}

  .modal{position:fixed;inset:0;z-index:50;display:flex}
  .modal[hidden]{display:none}
  .modal-backdrop{position:absolute;inset:0;background:rgba(17,32,43,.55)}
  .modal-inner{position:relative;margin:auto;width:min(1240px,96vw);max-height:95vh;
    overflow:auto;background:var(--paper);border-radius:10px;box-shadow:0 14px 54px rgba(17,32,43,.42);padding:16px}
  .modal-close{position:absolute;top:12px;right:14px;z-index:2;font-size:17px;line-height:1;
    border:1px solid var(--line);background:#fff;border-radius:6px;padding:6px 10px;cursor:pointer;color:var(--ink-soft)}
  .modal-close:hover{color:var(--ink);border-color:#bcccd1}
  .modal-host .bigpanel{border:0;padding:8px 6px 4px}

  /* Segmented controls (time range + long-waiter threshold) */
  .rangewrap{margin-left:auto;display:inline-flex;align-items:center;gap:8px}
  .segbtns{display:inline-flex;border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .segbtn{font:inherit;font-size:12.5px;padding:5px 11px;border:0;border-right:1px solid var(--line);
    background:#fff;cursor:pointer;color:var(--ink-soft);white-space:nowrap}
  .segbtn:last-child{border-right:0}
  .segbtn:hover{background:var(--grid)}
  .segbtn.active{background:var(--org);color:#fff}
  .engtoggle{display:inline-flex;align-items:center;gap:6px;margin:0;cursor:pointer;
    font:inherit;font-size:13px;text-transform:none;letter-spacing:0;color:var(--ink)}
  .engtoggle input{margin:0;cursor:pointer;accent-color:var(--org)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>NHS RTT Waiting Times Dashboard</h1>
    <div class="sub">England &middot; Referral to Treatment &mdash; 18-week waiting times &amp; the waiting list</div>
    <div style="font-family:ui-monospace,Menlo,monospace;font-size:12px;margin-top:8px">
      <a href="../" style="color:var(--org);text-decoration:none">&larr; Cancer Waiting Times Dashboard</a>
    </div>
  </header>

  <div class="controls">
    <div>
      <label>Organisation</label>
      <div class="typebtns" id="typebtns">
        <button type="button" class="typebtn" data-type="national">England</button>
        <button type="button" class="typebtn" data-type="provider">Providers</button>
        <button type="button" class="typebtn" data-type="icb">Commissioners</button>
      </div>
      <div class="orgrow">
        <div class="fdrop orgbtnwrap" id="orgdrop">
          <button id="orgbtn" class="filterbtn" aria-haspopup="listbox" aria-expanded="false">
            <span id="orglabel">England — all-England</span><span class="caret">&#9662;</span></button>
          <div id="orgpanel" class="filterpanel" role="listbox" hidden>
            <input id="orgsearch" class="dropsearch" type="search" autocomplete="off"
              placeholder="Type a trust or ICB name or code&hellip;">
            <div id="orgoptions"></div>
          </div>
        </div>
        <div class="orgname" id="orgname"></div>
      </div>
    </div>
  </div>

  <!-- Three summary cards = the MEASURE switcher (% within 18wk / waiting list / long waiters) -->
  <div class="cards" id="cards"></div>

  <div class="bigpanel" id="bigpanel">
    <div class="ttl"><h2 id="bigttl"></h2><span class="tag" id="bigtag"></span>
      <span class="charttools" id="charttools">
        <button type="button" id="expandbtn" class="toolbtn" title="Open the chart full-screen">&#10530; Expand</button>
        <span class="fdrop" style="display:inline-block">
          <button type="button" id="dlbtn" class="toolbtn" aria-haspopup="true" aria-expanded="false"
            title="Download the chart as an image">&#10515; Download &#9662;</button>
          <div id="dlpanel" class="filterpanel dlmenu" hidden>
            <button type="button" class="fopt" id="dlpng">PNG image</button>
            <button type="button" class="fopt" id="dlsvg">SVG vector</button>
          </div>
        </span>
      </span>
    </div>
    <div class="filterbar">
      <!-- Long-waiter threshold sub-control: shows ONLY for the "Long waiters" measure -->
      <span class="fgrp" id="threshwrap" hidden>
        <span class="flabel">Waiting over</span>
        <span class="segbtns" id="threshbtns">
          <button type="button" class="segbtn" data-th="52">52 wks</button>
          <button type="button" class="segbtn" data-th="65">65 wks</button>
          <button type="button" class="segbtn" data-th="78">78 wks</button>
          <button type="button" class="segbtn" data-th="104">104 wks</button>
        </span>
      </span>
      <span class="fgrp" id="engwrap">
        <label class="engtoggle"><input type="checkbox" id="engchk" checked> Show England</label>
      </span>
      <span id="slicehint" class="slicehint"></span>
      <span class="rangewrap" id="rangewrap">
        <span class="flabel">Time range</span>
        <span class="segbtns" id="rangebtns">
          <button type="button" class="segbtn" data-range="3y">3 years</button>
          <button type="button" class="segbtn" data-range="12m">12 months</button>
          <button type="button" class="segbtn" data-range="all">All</button>
        </span>
      </span>
    </div>
    <div class="legend" id="legend"></div>
    <div class="chartbox" id="chartbox"></div>
  </div>

  <div class="note" id="breaknote">Loading&hellip;</div>

  <footer id="foot"></footer>
</div>

<div id="chartmodal" class="modal" hidden>
  <div class="modal-backdrop" id="modalbackdrop"></div>
  <div class="modal-inner">
    <button type="button" class="modal-close" id="modalclose" title="Close (Esc)">&#10005;</button>
    <div class="modal-host" id="modalhost"></div>
  </div>
</div>

<script>
const DATA = "data/";
const NATIONAL_CODE = "__NATIONAL__";
const DEFAULT_MEASURE = "pct18";
const THRESH = 10;                       // pipeline RELIABILITY_THRESHOLD (pct18 only; ~never trips at all-TF level)
let META=null, NATIONAL=null, CURRENT=null;
let MEASURE=DEFAULT_MEASURE;             // pct18 | waitlist | longwait  (the three cards)
let CURRENT_TYPE="national";             // national | provider | icb
let LWTHRESH=52;                         // long-waiter threshold (52|65|78|104), shown for the longwait measure
const RANGE_MONTHS={"3y":36,"12m":12,"all":Infinity};
let RANGE="3y";
let SHOW_ENGLAND=true;                   // England comparison overlay (% measure only — counts don't share a scale)
let ACTIVE_NAT=null;                     // England overlay currently drawn (for tooltip scaling/export)

const MEASURES=[
  {key:"pct18",    title:"% within 18 weeks", code:"INCOMPLETE", kind:"rate"},
  {key:"waitlist", title:"Waiting-list size", code:"INCOMPLETE", kind:"count"},
  {key:"longwait", title:"Long waiters",      code:"INCOMPLETE", kind:"count"},
];
const measureMeta = k => MEASURES.find(m=>m.key===k);

const ABBR=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const _MN=["January","February","March","April","May","June","July","August","September","October","November","December"];
const fmtPct = p => (p*100).toFixed(1)+"%";
const monthLabel = m => {const[y,mm]=m.split("-");return ABBR[+mm-1]+" "+y.slice(2);};
const tipMonth   = m => {const[y,mm]=m.split("-");return ABBR[+mm-1]+" "+y;};
const fullMonth = m => {const[y,mm]=m.split("-");return _MN[+mm-1]+" "+y;};
const isoDate = iso => {const[y,m,d]=iso.slice(0,10).split("-");return (+d)+" "+_MN[+m-1]+" "+y;};
const commas = v => (+v).toLocaleString();
// Compact count: 7,093,502 -> "7.09M"; 97,388 -> "97.4k"; 154 -> "154".
function fmtCompact(v){
  v=+v;
  if(v>=1e6) return (v/1e6).toFixed(2)+"M";
  if(v>=1e4) return (v/1e3).toFixed(1)+"k";
  if(v>=1e3) return (v/1e3).toFixed(2)+"k";
  return commas(v);
}
// Axis tick label: clean K/M with no trailing decimals where possible.
function fmtAxis(v){
  if(v>=1e6) return (v/1e6)%1===0 ? (v/1e6)+"M" : (v/1e6).toFixed(1)+"M";
  if(v>=1e3) return (v/1e3)%1===0 ? (v/1e3)+"k" : (v/1e3).toFixed(0)+"k";
  return ""+v;
}

function footerHTML(M){
  const latest=fullMonth(M.months[M.months.length-1]), built=isoDate(M.built_at);
  return `Data source: <a href="https://www.england.nhs.uk/statistics/statistical-work-areas/rtt-waiting-times/" target="_blank" rel="noopener">NHS England Referral to Treatment (RTT) waiting times statistics</a>, published monthly and used here under the Open Government Licence v3.0. Figures are derived from the monthly Full CSV extract (Incomplete pathways), aggregated across treatment functions; non-English-commissioned activity is excluded. This dashboard is an independent tool and is not affiliated with or endorsed by NHS England. NHS England also publishes an official RTT dashboard.<br><br>`+
    `Data to ${latest}. Last updated ${built}.<br><br>`+
    `Some independent-sector providers with very little recent activity are hidden from the selectors but remain reachable by direct link.`;
}

async function init(){
  META = await (await fetch(DATA+"meta.json")).json();
  document.getElementById("foot").innerHTML = footerHTML(META);
  NATIONAL = await (await fetch(DATA+"national.json")).json();
  const idx = await (await fetch(DATA+"index.json")).json();
  window._idx = idx;
  document.getElementById("breaknote").innerHTML =
    "&#9888; <b>February 2024 series break.</b> From February 2024, community-service pathways "+
    "(e.g. community paediatrics) are no longer reported in RTT and moved to the Community Health "+
    "Services waiting-list collection — so figures before and after are not strictly comparable. "+
    "The dashed marker in the chart shows where this happens (when the visible window reaches back that far).";

  document.querySelectorAll(".typebtn").forEach(b=>b.addEventListener("click",()=>setType(b.dataset.type)));
  document.getElementById("orgbtn").addEventListener("click", toggleOrgPanel);
  document.getElementById("orgsearch").addEventListener("input", e=>buildOrgOptions(e.target.value));
  document.getElementById("orgsearch").addEventListener("keydown", dropSearchKey);
  document.addEventListener("click", e=>{ if(!e.target.closest(".fdrop")){ closeOrgPanel(); closeDlPanel(); } });
  document.getElementById("expandbtn").addEventListener("click", toggleExpand);
  document.getElementById("modalclose").addEventListener("click", closeModal);
  document.getElementById("modalbackdrop").addEventListener("click", closeModal);
  document.addEventListener("keydown", e=>{ if(e.key==="Escape" && EXPANDED) closeModal(); });
  document.getElementById("dlbtn").addEventListener("click", toggleDlPanel);
  document.getElementById("dlpng").addEventListener("click", ()=>{ closeDlPanel(); downloadChart("png"); });
  document.getElementById("dlsvg").addEventListener("click", ()=>{ closeDlPanel(); downloadChart("svg"); });
  document.querySelectorAll("#rangebtns .segbtn").forEach(b=>b.addEventListener("click", ()=>setRange(b.dataset.range)));
  document.querySelectorAll("#threshbtns .segbtn").forEach(b=>b.addEventListener("click", ()=>setThresh(+b.dataset.th)));
  document.getElementById("engchk").addEventListener("change", e=>setShowEngland(e.target.checked));

  const qs = new URLSearchParams(location.search);
  const qM = (qs.get("measure")||"").toLowerCase();
  if(measureMeta(qM)) MEASURE=qM;
  const qRange = qs.get("range"); if(qRange && (qRange in RANGE_MONTHS)) RANGE=qRange;
  const qTh = +qs.get("th"); if([52,65,78,104].includes(qTh)) LWTHRESH=qTh;
  if(qs.get("england")==="off") SHOW_ENGLAND=false;
  const qOrg = qs.get("org");
  const qo = qOrg && qOrg!==NATIONAL_CODE && idx.find(o=>o.code===qOrg);
  if(qo) await setType(qo.level, qo.code); else await setType("national");
  if(qs.get("expand")==="open") openModal();
  const qOrgq=qs.get("orgq");
  if(qOrgq!=null && CURRENT_TYPE!=="national"){
    openOrgPanel();
    const e=document.getElementById("orgsearch"); e.value=qOrgq; buildOrgOptions(qOrgq);
  }
}

/* ---------- org picker (reused from the cancer dashboard) ---------- */
async function setType(type, code){
  CURRENT_TYPE=type;
  document.querySelectorAll(".typebtn").forEach(b=>b.classList.toggle("active", b.dataset.type===type));
  closeOrgPanel();
  const drop=document.getElementById("orgdrop");
  if(type==="national"){
    drop.hidden=true;
    document.getElementById("orglabel").textContent="England — all-England";
    await loadNational(); return;
  }
  drop.hidden=false;
  const list=orgListFor(type);
  const full=window._idx.filter(o=>o.level===type);
  const pick=(code && full.find(o=>o.code===code)) || list[0];
  if(!pick) return;
  document.getElementById("orglabel").textContent=`${pick.name} (${pick.code})`;
  buildOrgOptions("");
  await loadOrg(pick.code);
}
function orgListFor(type){
  return window._idx.filter(o=>o.level===type && !o.hidden).sort((a,b)=>a.name.localeCompare(b.name));
}
// Classify for the grouped picker, off the org NAME: NHS Trust vs Independent
// sector (providers); ICB vs Other (commissioners — the national hubs).
function orgGroupOf(o){
  const u=(o.name||"").toUpperCase();
  if(o.level==="icb") return u.includes("INTEGRATED CARE BOARD") ? "ICB" : "Other";
  const isTrust=(u.includes("TRUST") && (u.includes("NHS")||u.includes("NATIONAL HEALTH SERVICE")));
  return isTrust ? "NHS Trust" : "Independent sector";
}
function buildOrgOptions(q){
  const host=document.getElementById("orgoptions"); host.innerHTML="";
  q=(q||"").trim().toLowerCase();
  const list=orgListFor(CURRENT_TYPE).filter(o=> !q || o.name.toLowerCase().includes(q) || o.code.toLowerCase().includes(q));
  if(!list.length){ host.innerHTML='<div class="fgroup first">No matches</div>'; return; }
  const order = CURRENT_TYPE==="icb" ? ["ICB","Other"] : ["NHS Trust","Independent sector"];
  let first=true;
  for(const grp of order){
    const items=list.filter(o=>orgGroupOf(o)===grp);
    if(!items.length) continue;
    const h=document.createElement("div"); h.className="fgroup"+(first?" first":""); h.textContent=grp;
    host.appendChild(h); first=false;
    items.forEach(o=>{ const b=document.createElement("button");
      b.className="fopt"+(CURRENT && CURRENT.code===o.code ? " active":"");
      b.setAttribute("role","option"); b.textContent=`${o.name} (${o.code})`;
      b.onclick=()=>selectOrg(o); host.appendChild(b); });
  }
}
function selectOrg(o){
  document.getElementById("orglabel").textContent=`${o.name} (${o.code})`;
  closeOrgPanel(); loadOrg(o.code);
}
function toggleOrgPanel(){ const p=document.getElementById("orgpanel"); if(p && !p.hidden) closeOrgPanel(); else openOrgPanel(); }
function openOrgPanel(){
  if(CURRENT_TYPE==="national") return;
  const p=document.getElementById("orgpanel"), s=document.getElementById("orgsearch");
  s.value=""; buildOrgOptions("");
  p.hidden=false; document.getElementById("orgbtn").setAttribute("aria-expanded","true");

/* ---------- measures: series helpers ---------- */
// Rate series (pct18): {months, performance, total, within_target, data_status, target}.
function rateSeries(org){
  const m=org.measures.pct18;
  return {months:org.months, performance:m.performance, total:m.total,
    within_target:m.within_target, data_status:m.data_status, target:m.target};
}
// Count series for a measure: returns {months, value, data_status, label, unit}.
function countSeries(org, measure, thresh){
  if(measure==="waitlist"){
    return {months:org.months, value:org.measures.waitlist.value,
      data_status:org.measures.waitlist.data_status, label:"on the waiting list", unit:"patients waiting"};
  }
  const lw=org.measures.longwait;
  return {months:org.months, value:lw["w"+thresh], data_status:lw.data_status,
    label:`waiting more than ${thresh} weeks`, unit:`waiting > ${thresh} wks`};
}

// Clip parallel arrays to months >= minMonth (string compare on "YYYY-MM").
function clipObj(s, minMonth){
  if(!s||!s.months||!s.months.length||minMonth==null) return s;
  const i0=s.months.findIndex(m=>m>=minMonth);
  if(i0<=0) return s;
  const out=Object.assign({},s);
  for(const k of Object.keys(s)) if(Array.isArray(s[k])) out[k]=s[k].slice(i0);
  return out;
}
function firstVisibleMonth(months){
  const n=RANGE_MONTHS[RANGE];
  return (!isFinite(n) || months.length<=n) ? months[0] : months[months.length-n];
}

/* ---------- summary cards (the measure switcher) ---------- */
function renderCards(){
  const host=document.getElementById("cards"); host.innerHTML="";
  for(const m of MEASURES){
    const card=document.createElement("div");
    card.tabIndex=0; card.dataset.key=m.key;
    card.className="scard"+(m.key===MEASURE?" active":"");
    let body;
    if(m.kind==="rate"){
      const s=rateSeries(CURRENT); const last=s.performance.length-1;
      const cur=s.performance[last], meets=cur>=s.target;
      body=`<div class="figure"><b>${fmtPct(cur)}</b>
          <span class="vs ${meets?'meets':'under'}">${meets?'&#10003; meets':'&#9660; below'} ${fmtPct(s.target)} target</span></div>
        <div class="spark">${sparkRate(s)}</div>
        <div class="mon">latest ${tipMonth(s.months[last])}</div>`;
    } else {
      const s=countSeries(CURRENT, m.key, LWTHRESH); const last=s.value.length-1;
      const cur=+s.value[last];
      const yi=Math.max(0,last-12), yoy=+s.value[yi];
      const delta=cur-yoy, dpct=yoy?delta/yoy*100:0;
      const better = m.key==="longwait" ? delta<0 : delta<0;  // for both, fewer is better
      const arrow= delta===0?"":(delta<0?"&#9660;":"&#9650;");
      const sub = m.key==="longwait" ? `&gt; ${LWTHRESH} wks` : `patients waiting`;
      body=`<div class="figure"><b>${fmtCompact(cur)}</b>
          <span class="vs ${better?'meets':'under'}">${arrow} ${Math.abs(dpct).toFixed(0)}% vs yr ago</span></div>
        <div class="spark">${sparkCount(s)}</div>
        <div class="mon">${sub} &middot; latest ${tipMonth(s.months[last])}</div>`;
    }
    card.innerHTML=`<div class="stdcode">${m.code}</div><h3>${m.title}</h3>${body}`;
    const pick=()=>{ if(MEASURE===m.key) return; MEASURE=m.key; renderCards(); renderBig(); };
    card.addEventListener("click",pick);
    card.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();pick();}});
    host.appendChild(card);
  }
}

// Rate sparkline (last ~15 months) with the 92% target rule.
function sparkRate(s){
  const W=190,H=42,P=3, k=Math.min(15,s.performance.length);
  const vals=s.performance.slice(-k);
  const meets=vals[vals.length-1]>=s.target;
  let lo=Math.min(...vals,s.target), hi=Math.max(...vals,s.target);
  const pad=(hi-lo)*0.22||0.02; lo-=pad; hi+=pad;
  const x=i=>P+(i/((k-1)||1))*(W-2*P);
  const y=v=>P+(1-(v-lo)/((hi-lo)||1))*(H-2*P);
  const ty=y(s.target).toFixed(1);
  let path="";
  for(let i=0;i<k-1;i++)
    path+=`<path d="M${x(i).toFixed(1)} ${y(vals[i]).toFixed(1)} L${x(i+1).toFixed(1)} ${y(vals[i+1]).toFixed(1)}" fill="none" stroke="var(--org)" stroke-width="1.8"/>`;
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}">
    <line x1="${P}" y1="${ty}" x2="${W-P}" y2="${ty}" stroke="var(--target)" stroke-dasharray="3 2" stroke-width="1.1"/>
    ${path}<circle cx="${x(k-1).toFixed(1)}" cy="${y(vals[k-1]).toFixed(1)}" r="2.8" fill="${meets?'var(--org)':'var(--target)'}"/></svg>`;
}
// Count sparkline (last ~15 months), baseline at 0, no target.
function sparkCount(s){
  const W=190,H=42,P=3, k=Math.min(15,s.value.length);
  const vals=s.value.slice(-k).map(Number);
  const hi=Math.max(...vals,1), lo=0;
  const x=i=>P+(i/((k-1)||1))*(W-2*P);
  const y=v=>P+(1-(v-lo)/((hi-lo)||1))*(H-2*P);
  let path="";
  for(let i=0;i<k-1;i++)
    path+=`<path d="M${x(i).toFixed(1)} ${y(vals[i]).toFixed(1)} L${x(i+1).toFixed(1)} ${y(vals[i+1]).toFixed(1)}" fill="none" stroke="var(--org)" stroke-width="1.8"/>`;
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}">${path}
    <circle cx="${x(k-1).toFixed(1)}" cy="${y(vals[k-1]).toFixed(1)}" r="2.8" fill="var(--org)"/></svg>`;
}

// Shared geometry. P.t = header strip for the break marker; P.r = right margin for labels.
const BG={W:920,H:380,P:{l:54,r:80,t:36,b:30}};

function breakMarkerSVG(xs, x){
  if(!META.series_break || xs[0] >= META.series_break) return "";
  const mi=xs.indexOf(META.series_break); if(mi<0) return "";
  const {P,H,W}=BG, mx=+x(mi).toFixed(1);
  const lx=Math.max(P.l+50, Math.min(W-P.r-50, mx));
  return `<line x1="${mx}" y1="${(P.t-18).toFixed(1)}" x2="${mx}" y2="${(H-P.b).toFixed(1)}" stroke="var(--ink-soft)" stroke-dasharray="4 3" stroke-width="1" opacity="0.7"/>`+
    `<text x="${lx.toFixed(1)}" y="${P.t-22}" font-size="9.5" text-anchor="middle" fill="var(--ink-soft)">Feb 2024 break</text>`;
}
function xAxisSVG(xs, x){
  const {H}=BG; const n=xs.length;
  let xl=""; const lstep=Math.max(1,Math.ceil(n/8)), guard=Math.ceil(lstep/2);
  for(let i=0;i<n-guard;i+=lstep) xl+=`<text x="${x(i).toFixed(1)}" y="${H-8}" font-size="10" text-anchor="middle" fill="var(--ink-soft)">${monthLabel(xs[i])}</text>`;
  xl+=`<text x="${x(n-1).toFixed(1)}" y="${H-8}" font-size="10" text-anchor="end" fill="var(--ink-soft)">${monthLabel(xs[n-1])}</text>`;
  return xl;
}

/* ----- % within 18 weeks (rate chart): 92% target + 65/70% recovery milestones ----- */
function renderRate(){
  const full=rateSeries(CURRENT);
  document.getElementById("bigttl").textContent = "% within 18 weeks";
  const minMonth=firstVisibleMonth(full.months);
  const s=clipObj(full, minMonth);
  let nat=null;
  if(SHOW_ENGLAND && !CURRENT.isNational){ nat=clipObj(rateSeries(NATIONAL), minMonth); }
  ACTIVE_NAT = nat;
  // legend
  const item=(sw,mk,label)=>`<span class="lgitem">${legendSwatch(sw,mk)}${label}</span>`;
  const org_=item(`stroke="var(--org)" stroke-width="2.4"`,`fill="var(--org)"`,CURRENT.isNational?"England":"this organisation");
  const nat_=item(`stroke="var(--nat)" stroke-width="1.6" opacity="0.85"`,null,"England");
  const tgt_=item(`stroke="var(--target)" stroke-width="1.4" stroke-dasharray="5 4"`,null,"92% standard");
  const ms_=item(`stroke="var(--milestone)" stroke-width="1.2" stroke-dasharray="2 3"`,null,"recovery milestones");
  const sep=`<span class="lgsep">&middot;</span>`, bar=`<span class="lgbar">|</span>`;
  document.getElementById("legend").innerHTML = org_ + bar + (nat?[nat_,tgt_,ms_].join(sep):[tgt_,ms_].join(sep));
  document.getElementById("chartbox").innerHTML = rateSVG(s,nat) + `<div class="tip" id="tip"></div>`;
  attachTips(s, "rate");
}
function rateScales(s,nat){
  const xs=s.months,n=xs.length;
  const vals=s.performance.concat([s.target, 0.65, 0.70]);
  if(nat) vals.push(...nat.performance);
  let lo=Math.min(...vals), hi=Math.max(...vals);
  const pad=(hi-lo)*0.08||0.02; lo=Math.max(0,lo-pad); hi=Math.min(1,hi+pad);
  const {W,H,P}=BG;
  return {xs,n,lo,hi, x:i=>P.l+(i/(n>1?n-1:1))*(W-P.l-P.r), y:v=>P.t+(1-(v-lo)/((hi-lo)||1))*(H-P.t-P.b)};
}
function rateSVG(s,nat){
  const {W,H,P}=BG, sc=rateScales(s,nat), {xs,n,lo,hi,x,y}=sc;
  const span=hi-lo, step=span>0.5?0.1:0.05;
  let g="";
  for(let v=Math.ceil(lo/step)*step; v<=hi+1e-9; v+=step)
    g+=`<line x1="${P.l}" y1="${y(v).toFixed(1)}" x2="${W-P.r}" y2="${y(v).toFixed(1)}" stroke="var(--grid)"/>`+
       `<text x="${P.l-6}" y="${(y(v)+3).toFixed(1)}" font-size="10" text-anchor="end" fill="var(--ink-soft)">${Math.round(v*100)}%</text>`;
  const mark=breakMarkerSVG(xs,x);
  // recovery milestones (65% / 70%) as faint reference lines, labelled in the right margin
  let ms="";
  for(const mm of (META.recovery_milestones||[])){
    if(mm.target>=0.92) continue;                  // 92% is the main target line below
    if(mm.target<lo||mm.target>hi) continue;
    const my=y(mm.target);
    ms+=`<line x1="${P.l}" y1="${my.toFixed(1)}" x2="${W-P.r}" y2="${my.toFixed(1)}" stroke="var(--milestone)" stroke-dasharray="2 3" stroke-width="1.1"/>`+
        `<text x="${W-3}" y="${(my-3).toFixed(1)}" font-size="9" text-anchor="end" fill="var(--milestone)">${xmlEsc(mm.label)}</text>`;
  }
  const ty=y(s.target);
  const tline=`<line x1="${P.l}" y1="${ty.toFixed(1)}" x2="${W-P.r}" y2="${ty.toFixed(1)}" stroke="var(--target)" stroke-dasharray="5 4" stroke-width="1.4"/>`+
    `<text x="${W-3}" y="${(ty+3.5).toFixed(1)}" font-size="10" text-anchor="end" fill="var(--target)">92% standard</text>`;
  let natpath="";
  if(nat){
    const nm={}; nat.months.forEach((mo,j)=>nm[mo]=nat.performance[j]);
    let d="",started=false;
    for(let i=0;i<n;i++){ const v=nm[xs[i]]; if(v==null){started=false;continue;}
      d+=(started?"L":"M")+x(i).toFixed(1)+" "+y(v).toFixed(1)+" "; started=true; }
    if(d) natpath=`<path d="${d.trim()}" fill="none" stroke="var(--nat)" stroke-width="1.6" opacity="0.85"/>`;
  }
  let line="";
  for(let i=0;i<n-1;i++)
    line+=`<path d="M${x(i).toFixed(1)} ${y(s.performance[i]).toFixed(1)} L${x(i+1).toFixed(1)} ${y(s.performance[i+1]).toFixed(1)}" fill="none" stroke="var(--org)" stroke-width="2.4"/>`;
  let pts="";
  for(let i=0;i<n;i++){
    const cx=+x(i).toFixed(1), cy=+y(s.performance[i]).toFixed(1);
    pts+=`<circle class="pt" data-i="${i}" cx="${cx}" cy="${cy}" r="3.2" fill="var(--org)"/>`+
      `<circle class="pt hit" data-i="${i}" cx="${cx}" cy="${cy}" r="11" fill="transparent"/>`;
  }
  return `<svg viewBox="0 0 ${W} ${H}" width="100%">${g}${mark}${ms}${natpath}${tline}${line}${xAxisSVG(xs,x)}${pts}</svg>`;
}

/* ----- count chart (waiting list / long waiters): numeric auto-scaling axis, no target ----- */

// "nice" top tick at 1/2/5 x 10^k >= max
function niceTop(max){
  if(max<=0) return 1;
  const exp=Math.floor(Math.log10(max)), base=max/Math.pow(10,exp);
  const mult = base<=1?1 : base<=2?2 : base<=5?5 : 10;
  return mult*Math.pow(10,exp);
}
function countScales(s){
  const xs=s.months,n=xs.length, vals=s.value.map(Number);
  const top=niceTop(Math.max(...vals,1)), lo=0, hi=top;
  const {W,H,P}=BG;
  return {xs,n,lo,hi, x:i=>P.l+(i/(n>1?n-1:1))*(W-P.l-P.r), y:v=>P.t+(1-(v-lo)/((hi-lo)||1))*(H-P.t-P.b)};
}
function countSVG(s){
  const {W,H,P}=BG, sc=countScales(s), {xs,n,hi,x,y}=sc;
  const ticks=5; let g="";
  for(let t=0;t<=ticks;t++){
    const v=hi*t/ticks;
    g+=`<line x1="${P.l}" y1="${y(v).toFixed(1)}" x2="${W-P.r}" y2="${y(v).toFixed(1)}" stroke="var(--grid)"/>`+
       `<text x="${P.l-6}" y="${(y(v)+3).toFixed(1)}" font-size="10" text-anchor="end" fill="var(--ink-soft)">${fmtAxis(v)}</text>`;
  }
  const mark=breakMarkerSVG(xs,x);
  let line="";
  for(let i=0;i<n-1;i++)
    line+=`<path d="M${x(i).toFixed(1)} ${y(+s.value[i]).toFixed(1)} L${x(i+1).toFixed(1)} ${y(+s.value[i+1]).toFixed(1)}" fill="none" stroke="var(--org)" stroke-width="2.4"/>`;
  let pts="";
  for(let i=0;i<n;i++){
    const cx=+x(i).toFixed(1), cy=+y(+s.value[i]).toFixed(1);
    pts+=`<circle class="pt" data-i="${i}" cx="${cx}" cy="${cy}" r="3.2" fill="var(--org)"/>`+
      `<circle class="pt hit" data-i="${i}" cx="${cx}" cy="${cy}" r="11" fill="transparent"/>`;
  }
  return `<svg viewBox="0 0 ${W} ${H}" width="100%">${g}${mark}${line}${xAxisSVG(xs,x)}${pts}</svg>`;
}

function legendSwatch(lineAttrs, markAttrs){
  const mark = !markAttrs ? `` : `<circle cx="14" cy="6" r="3" ${markAttrs}/>`;
  return `<svg width="28" height="12" style="vertical-align:middle;margin-right:5px"><line x1="1" y1="6" x2="27" y2="6" fill="none" ${lineAttrs}/>${mark}</svg>`;
}

/* ---------- tooltips ---------- */
function attachTips(s, kind){
  const box=document.getElementById("chartbox");
  box.querySelectorAll(".pt").forEach(c=> c.addEventListener("mouseenter",()=>showTip(+c.dataset.i, s, kind)));
  box.addEventListener("mouseleave",hideTip);
}
function showTip(i, s, kind){
  const tip=document.getElementById("tip"); if(!tip) return;
  let sc, vy, html;
  if(kind==="rate"){
    if(i<0||i>=s.performance.length) return;
    sc=rateScales(s, ACTIVE_NAT); vy=s.performance[i];
    html=`${tipMonth(s.months[i])} &middot; <span class="pct">${fmtPct(s.performance[i])}</span><br>`+
      `${commas(s.within_target[i])} of ${commas(s.total[i])} within 18 weeks`;
  } else {
    if(i<0||i>=s.value.length) return;
    sc=countScales(s); vy=+s.value[i];
    html=`${tipMonth(s.months[i])} &middot; <span class="pct">${commas(s.value[i])}</span><br>${s.label}`;
  }
  tip.innerHTML=html;
  tip.style.left=(sc.x(i)/BG.W*100)+"%";
  tip.style.top =(sc.y(vy)/BG.H*100)+"%";
  tip.style.display="block";
}
function hideTip(){const t=document.getElementById("tip"); if(t)t.style.display="none";}

/* ---------- image export (reused, generalised over measure) ---------- */
function closeDlPanel(){ const p=document.getElementById("dlpanel"); if(p)p.hidden=true;

function resolvePalette(str){
  const cs=getComputedStyle(document.documentElement);
  return str.replace(/var\((--[a-z-]+)\)/g, (m,k)=>{ const v=cs.getPropertyValue(k).trim(); return v||m; });
}
function xmlEsc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function humanName(name){
  const keep=new Set(["NHS","FT","ICB","UHB","HMP"]), small=new Set(["AND","OF","THE","FOR"]);
  return name.split(/\s+/).map(w=>{ const u=w.toUpperCase();
    return keep.has(u)?u : small.has(u)?w.toLowerCase() : w.charAt(0).toUpperCase()+w.slice(1).toLowerCase(); }).join(" ");
}
function exportName(ext){
  const m=measureMeta(MEASURE);
  const parts=[CURRENT.isNational?"England":humanName(CURRENT.name), m.title];
  if(MEASURE==="longwait") parts.push(LWTHRESH+"wk");
  return parts.join("-").replace(/[^A-Za-z0-9]+/g,"-").replace(/^-+|-+$/g,"")+"."+ext;
}
function buildExportSVG(){
  const chartSvg=document.querySelector("#chartbox svg"); if(!chartSvg) return null;
  const {W,H}=BG, headerH=58;
  const title=document.getElementById("bigttl").textContent;
  const sub=CURRENT.isNational ? "England" : humanName(CURRENT.name);
  const serif=`font-family="'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif"`;
  const head=
    `<text x="16" y="26" font-size="18" font-weight="600" fill="var(--ink)" ${serif}>${xmlEsc(title)}</text>`+
    `<text x="16" y="46" font-size="12.5" fill="var(--ink-soft)" ${serif}>${xmlEsc(sub)}</text>`;
  const svg=
    `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H+headerH}" viewBox="0 0 ${W} ${H+headerH}" font-family="ui-monospace,Menlo,monospace">`+
    `<rect width="${W}" height="${H+headerH}" fill="var(--panel)"/>`+head+
    `<g transform="translate(0,${headerH})">${chartSvg.innerHTML}</g></svg>`;
  return resolvePalette(svg);
}
function saveBlob(blob, name){
  const url=URL.createObjectURL(blob), a=document.createElement("a");
  a.href=url; a.download=name; document.body.appendChild(a); a.click();
  a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1500);
}
function downloadChart(kind){
  const svg=buildExportSVG(); if(!svg) return;
  if(kind==="svg"){ saveBlob(new Blob([svg],{type:"image/svg+xml;charset=utf-8"}), exportName("svg")); return; }
  const scale=2, {W,H}=BG, headerH=58, w=W*scale, h=(H+headerH)*scale;
  const img=new Image();
  const url=URL.createObjectURL(new Blob([svg],{type:"image/svg+xml;charset=utf-8"}));
  img.onload=()=>{ const c=document.createElement("canvas"); c.width=w; c.height=h;
    const ctx=c.getContext("2d"); ctx.scale(scale,scale); ctx.drawImage(img,0,0);
    URL.revokeObjectURL(url); c.toBlob(b=>{ if(b) saveBlob(b, exportName("png")); }, "image/png"); };
  img.onerror=()=>URL.revokeObjectURL(url);
  img.src=url;
}

init();
</script>
