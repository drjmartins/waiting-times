<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NHS Cancer Waiting Times Dashboard</title>
<style>
  :root{
    /* Clinical chart-paper palette: cool slate ink, a single signal-amber for
       the target line, restrained teal for the org series. */
    --ink:#11202b; --ink-soft:#4a5a64; --line:#d7e0e3; --paper:#fbfcfc;
    --panel:#ffffff; --org:#0f7d8c; --org-muted:#6db0ba; --nat:#9aa7ad; --target:#c8881d;
    --good:#2f7d4f; --bad:#b23b3b; --grid:#eef3f4;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    line-height:1.5}
  .wrap{max-width:1040px;margin:0 auto;padding:32px 24px 80px}
  header{border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:8px}
  h1{font-size:30px;margin:0 0 2px;letter-spacing:-.01em}
  .sub{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:12px;
    text-transform:uppercase;letter-spacing:.14em;color:var(--ink-soft)}
  .controls{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;
    margin:22px 0 10px}
  label{display:block;font-family:ui-monospace,Menlo,monospace;font-size:11px;
    text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);margin-bottom:5px}
  select,input[type=search]{font:inherit;font-size:15px;padding:8px 10px;
    border:1px solid var(--line);border-radius:5px;background:#fff;min-width:360px}
  .orgname{font-size:13px;color:var(--ink-soft);margin:6px 0 0}
  .orgname b{color:var(--ink)}
  /* Org type buttons (National / Providers / Commissioners) */
  .typebtns{display:inline-flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;margin-bottom:8px}
  .typebtn{font:inherit;font-size:13.5px;padding:7px 15px;border:0;border-right:1px solid var(--line);
    background:#fff;cursor:pointer;color:var(--ink-soft)}
  .typebtn:last-child{border-right:0}
  .typebtn:hover{background:var(--grid)}
  .typebtn.active{background:var(--org);color:#fff}
  .orgbtnwrap{display:block}
  .orgbtnwrap .filterbtn{min-width:380px}
  .filterbtn[disabled],.orgbtnwrap[hidden]{display:none}
  /* In-panel search box for the searchable dropdowns (scoped to beat the global
     input[type=search] min-width so it fits the panel). */
  .filterpanel .dropsearch{display:block;width:100%;min-width:0;font:inherit;font-size:14px;padding:7px 9px;
    margin-bottom:6px;border:1px solid var(--line);border-radius:5px}
  .note{background:#fff7e8;border:1px solid #f0dcae;border-left:3px solid var(--target);
    padding:10px 13px;font-size:13.5px;color:#6b561f;border-radius:0 4px 4px 0;margin:14px 0 22px}

  /* Shared cancer-group selector (drives all three cards + the big chart) */
  .groupbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:4px 0 16px}
  .groupbar .flabel{font-family:ui-monospace,Menlo,monospace;font-size:11px;
    text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft)}
  .groupbar .filterbtn{min-width:240px}
  .groupbar .filterbtn.grouped{border-color:var(--org);color:var(--org);font-weight:600;
    box-shadow:0 1px 6px rgba(15,125,140,.10)}

  /* Three summary cards = the standard switcher */
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:0 0 22px}
  @media(max-width:780px){.cards{grid-template-columns:1fr}}
  .scard{background:var(--panel);border:1px solid var(--line);border-radius:8px;
    padding:13px 15px 11px;cursor:pointer;position:relative;
    transition:border-color .12s,box-shadow .12s;border-top:3px solid var(--line)}
  .scard:hover{border-color:#bcccd1}
  .scard.active{border-top-color:var(--org);box-shadow:0 1px 0 var(--org) inset, 0 2px 10px rgba(15,125,140,.10)}
  .scard h3{margin:0;font-size:14.5px;letter-spacing:-.005em}
  .scard .stdcode{font-family:ui-monospace,Menlo,monospace;font-size:10.5px;
    text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft)}
  .scard .figure{display:flex;align-items:baseline;gap:8px;margin:6px 0 2px}
  .scard .figure b{font-size:27px;font-weight:600;letter-spacing:-.02em;line-height:1;
    color:var(--ink);font-family:inherit}
  .scard .figure .vs{font-size:11px;color:var(--ink-soft);font-family:ui-monospace,Menlo,monospace}
  .scard .figure .vs.meets{color:var(--good)} .scard .figure .vs.under{color:var(--target)}
  .scard .spark{margin-top:6px}
  .scard .mon{font-family:ui-monospace,Menlo,monospace;font-size:10.5px;color:var(--ink-soft);margin-top:3px}
  .scard .mon .lowtag{color:#8a6d1f}                 /* n<10 caveat, matches low-reliability hue */
  .scard.nodata{opacity:.72}
  .scard .figure b.muted{color:var(--org-muted)}     /* thin latest figure reads as de-emphasised */
  .scard .nogroup{font-size:13px;color:var(--ink-soft);margin:10px 0 8px}

  /* Big chart panel */
  .bigpanel{background:var(--panel);border:1px solid var(--line);border-radius:8px;
    padding:16px 18px 12px;position:relative}
  .bigpanel .ttl{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin:0 0 6px}
  .bigpanel .ttl h2{margin:0;font-size:18px;letter-spacing:-.01em}
  .bigpanel .ttl .tag{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--ink-soft)}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-family:ui-monospace,Menlo,monospace;
    font-size:11px;color:var(--ink-soft);margin:2px 0 4px}
  .legend i{display:inline-block;width:20px;height:0;vertical-align:middle;margin-right:5px}
  .chartbox{position:relative}
  .chartbox svg{display:block;width:100%;height:auto}
  .pt{cursor:pointer}
  /* Anchored tooltip */
  .tip{position:absolute;z-index:5;transform:translate(-50%,-118%);pointer-events:none;
    background:var(--ink);color:#fff;border-radius:6px;padding:7px 10px;
    font-family:ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.45;
    white-space:nowrap;box-shadow:0 3px 12px rgba(17,32,43,.25);display:none}
  .tip .pct{font-size:14px;font-weight:600}
  .tip .st{text-transform:uppercase;letter-spacing:.06em}
  .tip .prov{color:#f0c870} .tip .fin{color:#9be0b4}
  .tip::after{content:"";position:absolute;left:50%;top:100%;transform:translateX(-50%);
    border:5px solid transparent;border-top-color:var(--ink)}

  /* Breakdown filter (custom dropdown so options are in-DOM + reviewable) */
  .filterbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:2px 0 8px}
  .filterbar .flabel{font-family:ui-monospace,Menlo,monospace;font-size:11px;
    text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft)}
  .fgrp{display:inline-flex;align-items:center;gap:8px}
  .fgrp[hidden]{display:none}
  .fdrop{position:relative}
  .filterbtn{font:inherit;font-size:14px;padding:6px 12px;border:1px solid var(--line);
    border-radius:5px;background:#fff;cursor:pointer;color:var(--ink);min-width:200px;text-align:left}
  .filterbtn:hover{border-color:#bcccd1}
  .filterbtn .caret{float:right;color:var(--ink-soft);margin-left:8px}
  .filterpanel{position:absolute;z-index:8;top:calc(100% + 4px);left:0;min-width:280px;max-width:340px;
    max-height:340px;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:6px;
    box-shadow:0 6px 22px rgba(17,32,43,.16);padding:6px}
  .filterpanel[hidden]{display:none}
  .fgroup{font-family:ui-monospace,Menlo,monospace;font-size:10px;text-transform:uppercase;
    letter-spacing:.1em;color:var(--ink-soft);padding:8px 8px 3px;border-top:1px solid var(--grid);margin-top:4px}
  .fgroup.first{border-top:0;margin-top:0}
  .fopt{display:block;width:100%;text-align:left;font:inherit;font-size:13.5px;padding:5px 8px;
    border:0;background:none;border-radius:4px;cursor:pointer;color:var(--ink)}
  .fopt:hover{background:var(--grid)}
  .fopt.active{background:rgba(15,125,140,.10);color:var(--org);font-weight:600}
  .slicehint{font-size:12px;color:var(--ink-soft)}
  .lowrel{font-size:12.5px;color:#6b561f;background:#fff7e8;border:1px solid #f0dcae;
    border-left:3px solid var(--target);border-radius:0 4px 4px 0;padding:7px 11px;margin:8px 0 2px}
  .lowrel[hidden]{display:none}
  .emptyslice{padding:40px 10px;text-align:center;color:var(--ink-soft);font-size:14px}

  footer{margin-top:42px;border-top:1px solid var(--line);padding-top:16px;
    font-size:12.5px;color:var(--ink-soft)}
  a{color:var(--org)}
  svg text{font-family:ui-monospace,Menlo,monospace}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>NHS Cancer Waiting Times Dashboard</h1>
    <div class="sub">England &middot; Performance against NHS Cancer Waiting Time Targets</div>
    <div style="font-family:ui-monospace,Menlo,monospace;font-size:12px;margin-top:8px">
      <a href="compare.html" style="color:var(--org);text-decoration:none">Compare trusts &rarr;</a>
    </div>
  </header>

  <div class="controls">
    <div>
      <label>Organisation</label>
      <div class="typebtns" id="typebtns">
        <button type="button" class="typebtn" data-type="national">National</button>
        <button type="button" class="typebtn" data-type="provider">Providers</button>
        <button type="button" class="typebtn" data-type="icb">Commissioners</button>
      </div>
      <div class="fdrop orgbtnwrap" id="orgdrop">
        <button id="orgbtn" class="filterbtn" aria-haspopup="listbox" aria-expanded="false">
          <span id="orglabel">England — all-England</span><span class="caret">&#9662;</span></button>
        <div id="orgpanel" class="filterpanel" role="listbox" hidden>
          <input id="orgsearch" class="dropsearch" type="search" autocomplete="off"
            placeholder="Type a trust or ICB name or code&hellip;">
          <div id="orgoptions"></div>
        </div>
      </div>
      <div class="orgname" id="orgname"></div>
    </div>
  </div>

  <!-- Shared cancer-group filter: drives all three cards AND the big chart together. -->
  <div class="groupbar" id="groupbar">
    <span class="flabel">Cancer group</span>
    <div class="fdrop">
      <button id="groupbtn" class="filterbtn" aria-haspopup="listbox" aria-expanded="false">
        <span id="grouplabel">All cancers</span><span class="caret">&#9662;</span></button>
      <div id="grouppanel" class="filterpanel" role="listbox" hidden></div>
    </div>
    <span id="grouphint" class="slicehint"></span>
  </div>

  <!-- Three summary cards: latest figure + sparkline; clicking one switches the big chart. -->
  <div class="cards" id="cards"></div>

  <!-- One large time-series chart for the selected standard. -->
  <div class="bigpanel">
    <div class="ttl"><h2 id="bigttl"></h2><span class="tag" id="bigtag"></span></div>
    <div class="filterbar">
      <span class="fgrp" id="routewrap">
        <span class="flabel">Referral route</span>
        <div class="fdrop">
          <button id="filterbtn" class="filterbtn" aria-haspopup="listbox" aria-expanded="false">
            <span id="filterlabel">All routes</span><span class="caret">&#9662;</span></button>
          <div id="filterpanel" class="filterpanel" role="listbox" hidden></div>
        </div>
      </span>
      <span class="fgrp" id="modwrap" hidden>
        <span class="flabel">Treatment modality</span>
        <div class="fdrop">
          <button id="modbtn" class="filterbtn" aria-haspopup="listbox" aria-expanded="false">
            <span id="modlabel">All modalities</span><span class="caret">&#9662;</span></button>
          <div id="modpanel" class="filterpanel" role="listbox" hidden></div>
        </div>
      </span>
      <span id="slicehint" class="slicehint"></span>
    </div>
    <div class="legend" id="legend"></div>
    <div class="chartbox" id="chartbox"></div>
    <div id="lowrel" class="lowrel" hidden></div>
  </div>

  <!-- Oct-2023 comparability banner: sits BELOW the chart (the dashed in-chart
       marker on CMB31/CMB62 flags the break point itself). -->
  <div class="note" id="breaknote">Loading&hellip;</div>

  <footer id="foot"></footer>
</div>

<script>
const DATA = "data/";
const NATIONAL_CODE = "__NATIONAL__";
const DEFAULT_STD = "CMB62";            // 62-day combined is the most-watched
const THRESH = 10;                      // pipeline RELIABILITY_THRESHOLD: denom < this = low-reliability
let META=null, NATIONAL=null, CURRENT=null, CURRENT_STD=DEFAULT_STD;
let CURRENT_TYPE="national";                   // national | provider | icb (org type buttons)
// Composite breakdown state (v6). Three independent axes:
//   GROUP  — null = All cancers, else one of the ten tumour-site groups. The
//            page-level shared selector; drives the cards + chart and PERSISTS
//            across org / standard switches.
//   ROUTE  — null = All routes, else a referral route. Group-aware: when a group
//            is selected the route list narrows to that group's real routes.
//   MOD    — null = All modalities, else a treatment modality. ALL-CANCERS ONLY
//            (CMB31/CMB62) and only beneath a selected route — the cancer x route
//            x modality three-way isn't published, so modality can't nest under a
//            group. Selecting a group hides AND resets it (see selectGroup).
let GROUP=null, ROUTE=null, MOD=null;
// NHS England's ten tumour-site groups (matches pipeline/cancer_groups.TEN_GROUPS,
// the order NHS England's dashboard lists them).
const CANCER_GROUPS=["Breast","Gynaecology","Haematology","Head & Neck","Lower GI",
  "Lung","Other","Skin","Upper GI","Urology"];
const isGroupSlice = () => GROUP!==null;
// Is any narrowing beyond all-cancers active (for chart titles / tags)?
const sliceOnNow = () => GROUP!==null || ROUTE!==null || MOD!==null;
function sliceLabel(){
  const parts=[]; if(GROUP!==null)parts.push(GROUP); if(ROUTE!==null)parts.push(ROUTE);
  if(MOD!==null)parts.push(MOD); return parts.join(" · ");
}
let BREAKDOWN=null;                            // current org's breakdown file (lazy)
let NATIONAL_BREAKDOWN=null;                   // national breakdown (lazy, cached)
let ACTIVE_NAT=null;                           // national series currently overlaid (for tooltip scaling)

const ABBR=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const fmt = p => (p*100).toFixed(1)+"%";
const monthLabel = m => {const[y,mm]=m.split("-");return ABBR[+mm-1]+" "+y.slice(2);};
const tipMonth   = m => {const[y,mm]=m.split("-");return ABBR[+mm-1]+" "+y;};
const _MN=["January","February","March","April","May","June","July","August","September","October","November","December"];
const fullMonth = m => {const[y,mm]=m.split("-");return _MN[+mm-1]+" "+y;};
const isoDate = iso => {const[y,m,d]=iso.slice(0,10).split("-");return (+d)+" "+_MN[+m-1]+" "+y;};

function footerHTML(META){
  const latest=fullMonth(META.months[META.months.length-1]), built=isoDate(META.built_at);
  return `Data source: NHS England Cancer Waiting Times statistics, published monthly and used here under the Open Government Licence v3.0. This dashboard is an independent tool and is not affiliated with or endorsed by NHS England.<br><br>`+
    `Data to ${latest}. Last updated ${built}. Figures for the most recent months are provisional and subject to revision.`;
  // (The Oct-2023 comparability note now lives in the amber banner below the chart
  //  + the in-chart marker, so the old third footer line would be redundant.)
}

async function init(){
  META = await (await fetch(DATA+"meta.json")).json();
  document.getElementById("foot").innerHTML = footerHTML(META);
  NATIONAL = await (await fetch(DATA+"national.json")).json();
  const idx = await (await fetch(DATA+"index.json")).json();
  window._idx = idx;
  document.getElementById("breaknote").innerHTML =
    "&#9888; "+META.note+" This explorer defaults to data from "+META.comparability_break+" onward.";
  // Org type buttons + searchable org dropdown
  document.querySelectorAll(".typebtn").forEach(b=>b.addEventListener("click",()=>setType(b.dataset.type)));
  document.getElementById("orgbtn").addEventListener("click", toggleOrgPanel);
  document.getElementById("orgsearch").addEventListener("input", e=>buildOrgOptions(e.target.value));
  document.getElementById("orgsearch").addEventListener("keydown", dropSearchKey);
  document.getElementById("filterbtn").addEventListener("click", togglePanel);
  document.getElementById("modbtn").addEventListener("click", toggleModPanel);
  document.getElementById("groupbtn").addEventListener("click", toggleGroupPanel);
  document.addEventListener("click", e=>{ if(!e.target.closest(".fdrop")){ closePanel(); closeModPanel(); closeOrgPanel(); closeGroupPanel(); } });

  // Deep-link / render hooks: ?org=CODE, ?std=CMB31, ?slice=type:value, ?panel=open.
  const qs = new URLSearchParams(location.search);
  const qStd = (qs.get("std")||"").toUpperCase();
  if(META.standards[qStd]) CURRENT_STD = qStd;
  const qOrg = qs.get("org");
  // Shared cancer group can be set before the org loads so it persists through it.
  const qGroup = qs.get("group");
  if(qGroup && CANCER_GROUPS.includes(qGroup)) GROUP=qGroup;
  const qo = qOrg && qOrg!==NATIONAL_CODE && idx.find(o=>o.code===qOrg);
  if(qo) await setType(qo.level, qo.code);   // select a specific org via its type
  else await setType("national");            // default anchor: National
  // Deep-link / render hooks for the breakdown axes: ?route=, ?mod=.
  const qRoute = qs.get("route"), qMod = qs.get("mod");
  if(qRoute!=null || qMod!=null){
    await ensureBreakdown();
    if(qRoute!=null && routesForContext(CURRENT_STD).includes(qRoute)) ROUTE=qRoute;
    if(qMod!=null && modalityApplicable() && modsForRoute(CURRENT_STD,ROUTE).includes(qMod)) MOD=qMod;
    syncBreakdownUI(); renderCards(); renderBig();
  }
  if(qs.get("panel")==="open") await openPanel();
  if(qs.get("modpanel")==="open") await openModPanel();
  if(qs.get("gopen")!=null) openGroupPanel();   // render hook: open the shared group dropdown
  const qOrgq=qs.get("orgq");   // render hook: open the org dropdown mid-search
  if(qOrgq!=null && CURRENT_TYPE!=="national"){
    openOrgPanel();
    const e=document.getElementById("orgsearch"); e.value=qOrgq; buildOrgOptions(qOrgq);
  }
}

// Org type: National (no dropdown) / Providers / Commissioners. Switching to a
// provider/ICB type defaults to the first org alphabetically so the chart is
// never blank. `code` optionally selects a specific org (deep link).
async function setType(type, code){
  CURRENT_TYPE=type;
  document.querySelectorAll(".typebtn").forEach(b=>b.classList.toggle("active", b.dataset.type===type));
  closeOrgPanel();
  const drop=document.getElementById("orgdrop");
  if(type==="national"){
    drop.hidden=true;
    document.getElementById("orglabel").textContent="England — all-England";
    await loadNational();
    return;
  }
  drop.hidden=false;
  const list=orgListFor(type);
  // A direct ?org= link may target a HIDDEN org (negligible activity, out of the
  // picker but still reachable): resolve `code` against the FULL index, falling
  // back to the first visible org so the chart never blanks.
  const full=window._idx.filter(o=>o.level===type);
  const pick=(code && full.find(o=>o.code===code)) || list[0];
  if(!pick) return;
  document.getElementById("orglabel").textContent=`${pick.name} (${pick.code})`;
  buildOrgOptions("");
  await loadOrg(pick.code);
}
// Picker list: orgs of this type EXCLUDING negligible-activity ones flagged
// hidden in index.json (computed each build). Hidden orgs stay direct-linkable
// (see setType) — they're just out of the picker and default lists.
function orgListFor(type){
  return window._idx.filter(o=>o.level===type && !o.hidden).sort((a,b)=>a.name.localeCompare(b.name));
}
// Classify an org for the grouped picker. Mirrors pipeline-side reasoning off the
// org NAME: a provider is an "NHS Trust" if its name carries TRUST + NHS (or the
// spelled-out / abbreviated forms), else "Other" (private/community/LLP etc.);
// a commissioner is an "ICB" if its name says "INTEGRATED CARE BOARD", else
// "Other" (the specialised/national commissioning hubs). The data classifies
// cleanly: 173 trusts vs 28 other providers, 42 ICBs vs 8 hubs, no ambiguous cases.
function orgGroupOf(o){
  const u=(o.name||"").toUpperCase();
  if(o.level==="icb") return u.includes("INTEGRATED CARE BOARD") ? "ICB" : "Other";
  const isTrust=(u.includes("TRUST") && (u.includes("NHS")||u.includes("NATIONAL HEALTH SERVICE"))) || u.includes("NHS FT");
  return isTrust ? "NHS Trust" : "Other";
}
// Searchable, GROUPED option list (NHS Trust / ICB first, then Other). Substring
// match on name OR code, applied within each group.
function buildOrgOptions(q){
  const host=document.getElementById("orgoptions"); host.innerHTML="";
  q=(q||"").trim().toLowerCase();
  const list=orgListFor(CURRENT_TYPE).filter(o=> !q || o.name.toLowerCase().includes(q) || o.code.toLowerCase().includes(q));
  if(!list.length){ host.innerHTML='<div class="fgroup first">No matches</div>'; return; }
  const order = CURRENT_TYPE==="icb" ? ["ICB","Other"] : ["NHS Trust","Other"];
  let first=true;
  for(const grp of order){
    const items=list.filter(o=>orgGroupOf(o)===grp);
    if(!items.length) continue;
    const h=document.createElement("div"); h.className="fgroup"+(first?" first":""); h.textContent=grp;
    host.appendChild(h); first=false;
    items.forEach(o=>{ const b=document.createElement("button");
      b.className="fopt"+(CURRENT && CURRENT.code===o.code ? " active":"");
      b.setAttribute("role","option"); b.textContent=`${o.name} (${o.code})`;
      b.onclick=()=>selectOrg(o); host.appendChild(b); });
  }
}
function selectOrg(o){
  document.getElementById("orglabel").textContent=`${o.name} (${o.code})`;
  closeOrgPanel(); loadOrg(o.code);
}
function toggleOrgPanel(){ const p=document.getElementById("orgpanel"); if(p && !p.hidden) closeOrgPanel(); else openOrgPanel(); }
function openOrgPanel(){
  if(CURRENT_TYPE==="national") return;
  const p=document.getElementById("orgpanel"), s=document.getElementById("orgsearch");
  s.value=""; buildOrgOptions("");
  p.hidden=false; document.getElementById("orgbtn").setAttribute("aria-expanded","true");
  setTimeout(()=>s.focus(),0);
}
function closeOrgPanel(){ const p=document.getElementById("orgpanel"); if(p)p.hidden=true;
  const b=document.getElementById("orgbtn"); if(b)b.setAttribute("aria-expanded","false"); }
// Shared keyboard handler for in-panel search inputs: Enter picks first match, Esc closes.
function dropSearchKey(e){
  if(e.key==="Enter"){ const f=e.target.parentElement.querySelector(".fopt"); if(f){e.preventDefault();f.click();} }
  else if(e.key==="Escape"){ closeOrgPanel(); closePanel(); closeModPanel(); }
}

// On an org/standard switch the shared cancer GROUP persists (page-level), but
// the route/modality narrowing resets: route values differ by standard, and a
// freshly-loaded org's breakdown may not publish the previously-picked slice.
function resetSliceForSwitch(){ ROUTE=null; MOD=null; }
// When a group is active we need the breakdown file loaded before render (the
// cards + chart read the group's series from it).
async function ensureForGroup(){ if(isGroupSlice()) await ensureBreakdown(); }

async function loadNational(){
  // national.json carries only {standards}; wrap it with identifying fields.
  CURRENT = Object.assign({code:NATIONAL_CODE, name:"England", level:"national",
    region:"England", isNational:true}, NATIONAL);
  BREAKDOWN=null; resetSliceForSwitch();
  await ensureForGroup();
  render();
}
async function loadOrg(code){
  CURRENT = await (await fetch(DATA+"org/"+code+".json")).json();
  CURRENT.isNational=false;
  BREAKDOWN=null; resetSliceForSwitch();   // breakdown is per-org; refetch lazily
  await ensureForGroup();
  render();
}

function render(){
  // If the org we switched to lacks the kept standard, fall back sensibly.
  if(!CURRENT.standards[CURRENT_STD])
    CURRENT_STD = META.standards[DEFAULT_STD] && CURRENT.standards[DEFAULT_STD]
      ? DEFAULT_STD : Object.keys(CURRENT.standards)[0];
  // Byline: org name + region only — no "Provider (trust)" / "Commissioner (ICB)"
  // prefix (the grouped picker already conveys the type).
  document.getElementById("orgname").innerHTML = CURRENT.isNational
    ? `<b>England</b> &middot; all-England aggregate`
    : `<b>${CURRENT.name}</b>${CURRENT.region&&CURRENT.region!=="England"?" &middot; "+CURRENT.region:""}`;
  closePanel(); closeModPanel(); updateGroupLabel();
  renderCards();
  renderBig();   // calls syncBreakdownUI() to sync the route/modality controls
}

/* ---- summary cards (the switcher) ---- */
// The series a card shows: the shared cancer group's series when one is selected
// (read from the loaded breakdown file), else the all-cancers headline. Returns
// null when a group is selected but not published for this standard at this org.
function cardSeries(std){
  const base=CURRENT.standards[std]; if(!base) return undefined;
  if(!isGroupSlice()) return base;          // cards follow the GROUP only (route/mod narrow the big chart, not the cards)
  const cg = BREAKDOWN && BREAKDOWN.standards[std] && BREAKDOWN.standards[std].cancer_group;
  const gs = cg && cg[GROUP];
  return gs ? Object.assign({target:base.target,label:base.label}, gs) : null;
}
function renderCards(){
  const host=document.getElementById("cards"); host.innerHTML="";
  const grouped=isGroupSlice();
  for(const std of Object.keys(META.standards)){
    const base=CURRENT.standards[std]; if(!base) continue;   // standard absent entirely → no card
    const s=cardSeries(std);
    const card=document.createElement("div");
    card.tabIndex=0; card.dataset.std=std;
    const title=base.label.split("(")[0].trim();
    if(grouped && !s){
      // Group not published for this standard at this org: keep the card (still a
      // standard switcher) but say so rather than drawing a misleading figure.
      card.className="scard nodata"+(std===CURRENT_STD?" active":"");
      card.innerHTML=
        `<div class="stdcode">${std} &middot; ${GROUP}</div>
         <h3>${title}</h3>
         <div class="nogroup">No <b>${GROUP}</b> figures published for this standard here.</div>`;
    } else {
      const last=s.performance.length-1, cur=s.performance[last], meets=cur>=s.target;
      const lowLast=(+s.total[last])<THRESH;   // thin latest month → de-emphasise
      card.className="scard"+(std===CURRENT_STD?" active":"");
      card.innerHTML=
        `<div class="stdcode">${std}${grouped?" &middot; "+GROUP:""}</div>
         <h3>${title}</h3>
         <div class="figure"><b class="${lowLast?'muted':''}">${fmt(cur)}</b>
           <span class="vs ${meets?'meets':'under'}">${meets?'&#10003; meets':'&#9660; below'} ${fmt(s.target)} target</span></div>
         <div class="spark">${sparkSVG(s)}</div>
         <div class="mon">latest ${tipMonth(s.months[last])} &middot; ${s.data_status[last]}`+
           (lowLast?` &middot; <span class="lowtag">n=${(+s.total[last])}, low reliability</span>`:``)+`</div>`;
    }
    const pick=()=>{ if(CURRENT_STD===std) return; CURRENT_STD=std;
      resetSliceForSwitch(); closePanel(); closeModPanel();   // keep the shared group, reset route/modality
      renderCards(); renderBig(); };  // cards + chart switch together (renderBig re-syncs the controls)
    card.addEventListener("click",pick);
    card.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();pick();}});
    host.appendChild(card);
  }
}

// Small recent-trend sparkline (last ~15 months). Amber dashed target rule sits
// clearly inside the plot (extra headroom), and the latest-point dot turns amber
// when below target so a rising-but-still-short trend can't read as healthy.
// Group series at one org can be thin: months with n<THRESH are drawn in muted
// teal + dashed (and a sub-threshold latest point as a hollow muted ring), so a
// thin group can't read as a confident sparkline — the big chart's treatment,
// scaled down. (s.total is present on both the all-cancers and group series.)
function sparkSVG(s){
  const W=190,H=42,P=3;
  const k=Math.min(15,s.performance.length);
  const vals=s.performance.slice(-k);
  const tot=(s.total||[]).slice(-k);
  const low=i=> tot.length ? (+tot[i])<THRESH : false;
  const meets=vals[vals.length-1]>=s.target;
  let lo=Math.min(...vals,s.target), hi=Math.max(...vals,s.target);
  const pad=(hi-lo)*0.22||0.02; lo-=pad; hi+=pad;  // headroom: keep target off the edge
  const x=i=>P+(i/((k-1)||1))*(W-2*P);
  const y=v=>P+(1-(v-lo)/((hi-lo)||1))*(H-2*P);
  const ty=y(s.target).toFixed(1);
  let path="";
  for(let i=0;i<k-1;i++){
    const seg=`M${x(i).toFixed(1)} ${y(vals[i]).toFixed(1)} L${x(i+1).toFixed(1)} ${y(vals[i+1]).toFixed(1)}`;
    path += (low(i)||low(i+1))
      ? `<path d="${seg}" fill="none" stroke="var(--org-muted)" stroke-width="1.4" stroke-dasharray="2 2" opacity="0.9"/>`
      : `<path d="${seg}" fill="none" stroke="var(--org)" stroke-width="1.8"/>`;
  }
  const last=k-1;
  const dot = low(last) ? `fill="#fff" stroke="var(--org-muted)" stroke-width="1.4"`
                        : `fill="${meets?'var(--org)':'var(--target)'}"`;
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}">
    <line x1="${P}" y1="${ty}" x2="${W-P}" y2="${ty}" stroke="var(--target)" stroke-dasharray="3 2" stroke-width="1.1"/>
    ${path}
    <circle cx="${x(last).toFixed(1)}" cy="${y(vals[last]).toFixed(1)}" r="2.8" ${dot}/>
  </svg>`;
}

/* ---- breakdown filtering (v6: group-aware route + all-cancers-only modality) ---- */
async function loadNationalBreakdown(){
  if(!NATIONAL_BREAKDOWN) NATIONAL_BREAKDOWN = await (await fetch(DATA+"national.breakdown.json")).json();
  return NATIONAL_BREAKDOWN;
}
// Load-on-demand: only called when the user first opens a filter, picks a group, or a deep link.
async function ensureBreakdown(){
  await loadNationalBreakdown();
  if(CURRENT.isNational){ BREAKDOWN = NATIONAL_BREAKDOWN; return; }
  if(!BREAKDOWN) BREAKDOWN = await (await fetch(DATA+"org/"+CURRENT.code+".breakdown.json")).json();
}

// The routes offered for the current GROUP + standard, read from the loaded
// breakdown: a group's activity-filtered routes (cancer_group_route) when a group
// is selected, else the all-cancers route dim. Empty when none are published
// (e.g. FDS28, which has no route dim).
function routesForContext(std){
  const dim = BREAKDOWN && BREAKDOWN.standards[std]; if(!dim) return [];
  if(GROUP!==null){ const m=dim.cancer_group_route && dim.cancer_group_route[GROUP]; return m?Object.keys(m):[]; }
  return dim.route ? Object.keys(dim.route) : [];
}
// Modalities published for an all-cancers route (route x modality combos exist).
function modsForRoute(std, route){
  const dim = BREAKDOWN && BREAKDOWN.standards[std];
  if(!dim || !dim.modality || !dim.combination || route===null) return [];
  return Object.keys(dim.modality).filter(m => (route+" | "+m) in dim.combination);
}
// Modality dropdown shows ONLY in the all-cancers view, on CMB31/CMB62, beneath a
// selected route that has a published modality level (the three-way doesn't exist,
// so it can never nest under a group).
function modalityApplicable(){
  return GROUP===null && CURRENT_STD!=="FDS28" && ROUTE!==null && modsForRoute(CURRENT_STD,ROUTE).length>0;
}

// Resolve the big-chart series for a (headline {standards}, breakdown file, std),
// composing GROUP -> ROUTE -> MOD. Returns null when the composed slice isn't
// published there (the chart then shows an explain-empty state / hides the line).
function resolveSeries(allStd, bdata, std){
  const base = allStd && allStd[std]; if(!base) return null;
  const dim = bdata && bdata.standards && bdata.standards[std];
  const wrap = s => s ? Object.assign({target:base.target,label:base.label}, s) : null;
  if(GROUP!==null){
    if(ROUTE!==null){ const gr=dim&&dim.cancer_group_route&&dim.cancer_group_route[GROUP]; return wrap(gr&&gr[ROUTE]); }
    const g=dim&&dim.cancer_group&&dim.cancer_group[GROUP]; return wrap(g);
  }
  if(ROUTE!==null && MOD!==null){ const c=dim&&dim.combination; return wrap(c&&c[ROUTE+" | "+MOD]); }
  if(ROUTE!==null){ const r=dim&&dim.route; return wrap(r&&r[ROUTE]); }
  return base;
}
function activeOrgSeries(){ return resolveSeries(CURRENT.standards, BREAKDOWN, CURRENT_STD); }
// National comparison must MATCH the active slice (like-for-like); null => hide it.
function activeNatSeries(){
  if(!sliceOnNow()) return NATIONAL.standards[CURRENT_STD]||null;
  return resolveSeries(NATIONAL.standards, NATIONAL_BREAKDOWN, CURRENT_STD);
}

// Keep the two breakdown controls (route + conditional modality) in sync with
// GROUP/ROUTE/MOD + the standard. Called from renderBig, so the UI never drifts.
function syncBreakdownUI(){
  const std=CURRENT_STD;
  const hasRoutes = std!=="FDS28";   // CMB31/CMB62 publish routes; FDS28 does not
  document.getElementById("routewrap").hidden = !hasRoutes;
  document.getElementById("filterlabel").textContent = ROUTE===null ? "All routes" : ROUTE;
  const showMod = modalityApplicable();
  document.getElementById("modwrap").hidden = !showMod;
  if(showMod) document.getElementById("modlabel").textContent = MOD===null ? "All modalities" : MOD;
  const hint=document.getElementById("slicehint");
  hint.textContent =
    std==="FDS28" ? "Route and treatment-modality breakdowns aren't published for the 28-day standard."
    : GROUP!==null ? `${GROUP} group · narrow by referral route, or change the group above.`
    : ROUTE!==null ? "Pick a treatment modality to narrow this route further."
    : "Narrow by referral route, then treatment modality.";
}

// --- route dropdown (level 1, group-aware) ---
function selectRoute(route){           // route=null => All routes
  ROUTE = route; MOD = null;           // a route change starts modality fresh (it's a within-route narrowing)
  closePanel(); renderBig();           // cards follow the GROUP only; renderBig re-syncs both controls
}
// --- modality dropdown (level 2, all-cancers only) ---
function selectMod(mod){               // mod=null => All modalities
  MOD = mod; closeModPanel(); renderBig();
}

/* ---- shared cancer-group selector (drives cards + big chart together) ---- */
function groupText(){ return isGroupSlice() ? GROUP : "All cancers"; }
const OTHER_NOTE="&lsquo;Other&rsquo; is a catch-all and its make-up differs by standard: "+
  "FDS28&rsquo;s Other also absorbs brain/CNS, sarcoma, children&rsquo;s and non-specific-symptom "+
  "referrals (which have no group of their own), so it is not a like-for-like cohort across the three standards.";
const OTHER_CAVEAT="These sites appear only under the 28-day standard, so &lsquo;Other&rsquo; is "+
  "not a like-for-like cohort across the three standards.";
// Composition description for the COMPOSITE groups only, sourced from meta.json
// (built from cancer_groups.py so it can't drift from the actual mapping). The
// six 1:1 groups and All cancers show nothing.
function compositionFor(group){
  return (META && META.group_composition && META.group_composition[group]) || "";
}
function updateGroupLabel(){
  const e=document.getElementById("grouplabel"); if(e) e.textContent=groupText();
  const b=document.getElementById("groupbtn"); if(b) b.classList.toggle("grouped", isGroupSlice());
  const h=document.getElementById("grouphint"); if(!h) return;
  const comp = isGroupSlice() ? compositionFor(GROUP) : "";
  if(isGroupSlice() && GROUP==="Other")
    h.innerHTML = "&#9888; Aggregates "+comp+". "+OTHER_CAVEAT;   // composite + cross-standard caveat
  else if(comp)
    h.innerHTML = "Aggregates "+comp+".";                         // composite group make-up
  else
    h.innerHTML = "";                                             // 1:1 group / All cancers: no helper text
}
function toggleGroupPanel(){ const p=document.getElementById("grouppanel"); if(p && !p.hidden) closeGroupPanel(); else openGroupPanel(); }
function openGroupPanel(){
  const p=document.getElementById("grouppanel"); p.innerHTML="";
  const s=document.createElement("input"); s.className="dropsearch"; s.type="search";
  s.placeholder="Type to filter groups…"; s.autocomplete="off";
  s.addEventListener("input",()=>renderGroupOptions(s.value));
  s.addEventListener("keydown",groupSearchKey);
  p.appendChild(s);
  const opts=document.createElement("div"); opts.id="groupoptions"; p.appendChild(opts);
  renderGroupOptions("");
  p.hidden=false; document.getElementById("groupbtn").setAttribute("aria-expanded","true");
  setTimeout(()=>s.focus(),0);
}
function closeGroupPanel(){ const p=document.getElementById("grouppanel"); if(p)p.hidden=true;
  const b=document.getElementById("groupbtn"); if(b)b.setAttribute("aria-expanded","false"); }
function groupSearchKey(e){
  if(e.key==="Enter"){ const f=e.target.parentElement.querySelector(".fopt"); if(f){e.preventDefault();f.click();} }
  else if(e.key==="Escape"){ closeGroupPanel(); }
}
// Searchable: "All cancers" + NHS England's ten groups (substring match).
function renderGroupOptions(q){
  const host=document.getElementById("groupoptions"); host.innerHTML="";
  q=(q||"").trim().toLowerCase();
  const match=t=>!q||t.toLowerCase().includes(q);
  const opt=(label,val,on)=>{ const b=document.createElement("button");
    b.className="fopt"+(on?" active":""); b.textContent=label; b.setAttribute("role","option");
    b.onclick=()=>selectGroup(val); return b; };
  const hdr=(t,first)=>{ const g=document.createElement("div"); g.className="fgroup"+(first?" first":""); g.textContent=t; return g; };
  if(match("all cancers")){ host.appendChild(hdr("Overview",true)); host.appendChild(opt("All cancers",null,!isGroupSlice())); }
  const gs=CANCER_GROUPS.filter(match);
  if(gs.length){ host.appendChild(hdr("Cancer group",false));
    gs.forEach(g=>{ const o=opt(g,g, isGroupSlice()&&GROUP===g);
      if(g==="Other") o.title=OTHER_NOTE.replace(/&[a-z]+;/g, m=>({"&lsquo;":"‘","&rsquo;":"’"}[m]||""));
      host.appendChild(o); }); }
  if(!host.children.length) host.innerHTML='<div class="fgroup first">No matches</div>';
}
async function selectGroup(group){
  closeGroupPanel();
  GROUP = group;            // null = All cancers
  MOD = null;               // modality can't nest under a group (no three-way); always reset + hide (spec)
  if(isGroupSlice()) await ensureBreakdown();   // cards + chart read the group series from it
  // Keep the chosen route only if it still applies to the new context, else reset.
  if(ROUTE!==null && !routesForContext(CURRENT_STD).includes(ROUTE)) ROUTE=null;
  updateGroupLabel(); closePanel(); closeModPanel();
  renderCards(); renderBig();   // renderBig re-syncs the route/modality controls
}

// A searchable in-panel input (shared shape across the route + modality dropdowns).
function mkSearch(placeholder, oninput){
  const s=document.createElement("input"); s.className="dropsearch"; s.type="search";
  s.placeholder=placeholder; s.autocomplete="off";
  s.addEventListener("input",()=>oninput(s.value));
  s.addEventListener("keydown",dropSearchKey);
  return s;
}

  const b=document.getElementById("filterbtn"); if(b)b.setAttribute("aria-expanded","false"); }
async function togglePanel(){

function fopt(label,on,onclick){ const b=document.createElement("button");
  b.className="fopt"+(on?" active":""); b.textContent=label; b.setAttribute("role","option");
  b.onclick=onclick; return b; }
function fhdr(t,first){ const g=document.createElement("div"); g.className="fgroup"+(first?" first":""); g.textContent=t; return g; }
// Group-aware: all-cancers route dim, or the selected group's activity-filtered routes.
function renderRouteOptions(q){
  const host=document.getElementById("filteroptions"); host.innerHTML="";
  q=(q||"").trim().toLowerCase(); const match=t=>!q||t.toLowerCase().includes(q);

/* ---- big chart ---- */
function renderBig(){
  syncBreakdownUI();   // keep the route/modality controls + hint in lockstep with state
  const sAll=CURRENT.standards[CURRENT_STD];
  const org=activeOrgSeries();
  const sliceOn = sliceOnNow();
  document.getElementById("bigttl").textContent = sAll.label + (sliceOn? " — "+sliceLabel() : "");
  document.getElementById("bigtag").innerHTML=
    `${CURRENT_STD} &middot; target ${fmt(sAll.target)} &middot; ${CURRENT.isNational?"England":CURRENT.name}`;
  const box=document.getElementById("chartbox");
  const low=document.getElementById("lowrel");

  // Empty/absent slice for this org: explain rather than draw a blank chart.
  if(!org || !org.performance || !org.performance.length){
    box.innerHTML=`<div class="emptyslice">No data published for this breakdown at this organisation.</div>`;
    document.getElementById("legend").innerHTML=""; low.hidden=true; return;
  }
  const nat=activeNatSeries();
  ACTIVE_NAT = (!CURRENT.isNational && nat && nat.performance && nat.performance.length) ? nat : null;
  const sliceTag = sliceOn ? " &middot; "+sliceLabel() : "";
  const hasLow = org.total.some(v=>(+v)<THRESH);
  // Legend swatches mirror the chart EXACTLY: line style + marker dot where the
  // series carries markers (the England comparison line and target rule have none).
  document.getElementById("legend").innerHTML=
    `<span>${legendSwatch(`stroke="var(--org)" stroke-width="2.4"`,`fill="var(--org)"`)}${CURRENT.isNational?"England":"this organisation"}${sliceTag}</span>`+
    (ACTIVE_NAT?`<span>${legendSwatch(`stroke="var(--nat)" stroke-width="1.6" stroke-dasharray="3 3"`,null)}England${sliceTag}</span>`:``)+
    `<span>${legendSwatch(`stroke="var(--target)" stroke-width="1.4" stroke-dasharray="5 4"`,null)}target</span>`+
    `<span>${legendSwatch(`stroke="var(--org)" stroke-width="2.4" stroke-dasharray="5 4" opacity="0.6"`,`fill="#fff" stroke="var(--org)" stroke-width="1.6"`)}provisional</span>`+
    (hasLow?`<span>${legendSwatch(`stroke="var(--org-muted)" stroke-width="1.6" stroke-dasharray="2 3" opacity="0.9"`,`fill="#fff" stroke="var(--org-muted)" stroke-width="1.5"`)}low reliability (n&lt;${THRESH})</span>`:``);
  box.innerHTML = bigSVG(org, ACTIVE_NAT) + `<div class="tip" id="tip"></div>`;
  attachTips(org);

  // Sub-threshold months are SHOWN but flagged, not hidden.
  if(hasLow){
    low.hidden=false;
    low.innerHTML=`&#9675; Lighter-teal, dashed line segments and open markers are months with fewer than ${THRESH} patients in scope — part of this organisation's series, but too thin to read as reliable.`;
  } else low.hidden=true;

  // Render hook: ?tip=N opens the tooltip on point N (from the end if negative).
  const t=+(new URLSearchParams(location.search).get("tip"));
  if(!Number.isNaN(t) && location.search.includes("tip=")){
    const i=t<0?org.performance.length+t:t; showTip(i, org);
  }
}

// A legend swatch: a short line in the entry's exact style, plus a marker dot
// where that series renders one (omit the dot for marker-less lines).
function legendSwatch(lineAttrs, dotAttrs){
  return `<svg width="28" height="12" style="vertical-align:middle;margin-right:5px">`+
    `<line x1="1" y1="6" x2="27" y2="6" fill="none" ${lineAttrs}/>`+
    (dotAttrs?`<circle cx="14" cy="6" r="3" ${dotAttrs}/>`:``)+`</svg>`;
}

const BG={W:920,H:380,P:{l:46,r:16,t:16,b:30}};
function bigScales(s, nat){
  const xs=s.months, n=xs.length;
  const vals=s.performance.concat([s.target]);
  if(nat) vals.push(...nat.performance);
  let lo=Math.min(...vals), hi=Math.max(...vals);
  const pad=(hi-lo)*0.10||0.02; lo=Math.max(0,lo-pad); hi=Math.min(1,hi+pad);
  const {W,H,P}=BG;
  const x=i=>P.l+(i/(n>1?n-1:1))*(W-P.l-P.r);
  const y=v=>P.t+(1-(v-lo)/((hi-lo)||1))*(H-P.t-P.b);
  return {xs,n,lo,hi,x,y};
}
function bigSVG(s, nat){
  const {W,H,P}=BG;
  const sc=bigScales(s,nat); const {xs,n,lo,hi,x,y}=sc;
  // y gridlines: ~5 ticks on nice 5%/10% steps
  const span=hi-lo; const step=span>0.5?0.1:0.05;
  let g="";
  for(let v=Math.ceil(lo/step)*step; v<=hi+1e-9; v+=step){
    g+=`<line x1="${P.l}" y1="${y(v).toFixed(1)}" x2="${W-P.r}" y2="${y(v).toFixed(1)}" stroke="var(--grid)"/>`+
       `<text x="${P.l-6}" y="${(y(v)+3).toFixed(1)}" font-size="10" text-anchor="end" fill="var(--ink-soft)">${Math.round(v*100)}%</text>`;
  }
  // Oct-2023 standards-change marker: a vertical dashed rule at the comparability
  // break, on CMB31/CMB62 only (FDS28 has no break). Complements the banner below
  // the chart by marking exactly where the series stops being comparable.
  let mark="";
  if(CURRENT_STD!=="FDS28" && META && META.comparability_break){
    const mi=xs.indexOf(META.comparability_break);
    if(mi>=0){
      const mx=x(mi).toFixed(1);
      mark=`<line x1="${mx}" y1="${P.t}" x2="${mx}" y2="${(H-P.b).toFixed(1)}" stroke="var(--ink-soft)" stroke-dasharray="4 3" stroke-width="1" opacity="0.7"/>`+
        `<text x="${(+mx+4).toFixed(1)}" y="${P.t+9}" font-size="9.5" text-anchor="start" fill="var(--ink-soft)">standards changed</text>`;
    }
  }
  // target line
  const ty=y(s.target);
  const tline=`<line x1="${P.l}" y1="${ty.toFixed(1)}" x2="${W-P.r}" y2="${ty.toFixed(1)}" stroke="var(--target)" stroke-dasharray="5 4" stroke-width="1.4"/>`+
    `<text x="${W-P.r}" y="${(ty-5).toFixed(1)}" font-size="10" text-anchor="end" fill="var(--target)">target ${fmt(s.target)}</text>`;
  // national overlay (faint), aligned by MONTH (robust to slices that skip months)
  let natpath="";
  if(nat){
    const nm={}; nat.months.forEach((mo,j)=>nm[mo]=nat.performance[j]);
    let d="",started=false;
    for(let i=0;i<n;i++){ const v=nm[xs[i]];
      if(v==null){started=false;continue;}
      d+=(started?"L":"M")+x(i).toFixed(1)+" "+y(v).toFixed(1)+" "; started=true; }
    if(d) natpath=`<path d="${d.trim()}" fill="none" stroke="var(--nat)" stroke-width="1.6" stroke-dasharray="3 3"/>`;
  }
  // org series drawn PER SEGMENT so fragility reaches the line, not just markers:
  //  - a segment touching a sub-threshold month (n<10) is greyed + dashed (a
  //    fragile slice should look fragile — its 0%/100% bounces carry their own
  //    uncertainty, same principle as the funnel);
  //  - a segment touching a provisional month is org-dashed/lighter;
  //  - otherwise solid. (All-final, above-threshold series => all solid, as before.)
  let line="";
  for(let i=0;i<n-1;i++){
    const lowEdge=(+s.total[i])<THRESH || (+s.total[i+1])<THRESH;
    const provEdge=s.data_status[i]!=="final" || s.data_status[i+1]!=="final";
    const d=`M${x(i).toFixed(1)} ${y(s.performance[i]).toFixed(1)} L${x(i+1).toFixed(1)} ${y(s.performance[i+1]).toFixed(1)}`;
    // low-reliability: muted/lighter ORG teal (belongs to the org series, but
    // de-emphasised) — distinct from the grey England line; not as bold as solid.
    const style = lowEdge ? `stroke="var(--org-muted)" stroke-width="1.6" stroke-dasharray="2 3" opacity="0.9"`
                : provEdge ? `stroke="var(--org)" stroke-width="2.4" stroke-dasharray="5 4" opacity="0.6"`
                           : `stroke="var(--org)" stroke-width="2.4"`;
    line+=`<path d="${d}" fill="none" ${style}/>`;
  }
  // x labels: every ~6 months + last
  let xl="";
  for(let i=0;i<n;i+=6) xl+=`<text x="${x(i).toFixed(1)}" y="${H-8}" font-size="10" text-anchor="middle" fill="var(--ink-soft)">${monthLabel(xs[i])}</text>`;
  xl+=`<text x="${x(n-1).toFixed(1)}" y="${H-8}" font-size="10" text-anchor="end" fill="var(--ink-soft)">${monthLabel(xs[n-1])}</text>`;
  // hover points: filled = final; hollow org = provisional; hollow muted-teal = sub-threshold (n<10)
  let pts="";
  for(let i=0;i<n;i++){
    const prv=s.data_status[i]!=="final", low=(+s.total[i])<THRESH;
    const mk = low ? `fill="#fff" stroke="var(--org-muted)" stroke-width="1.6"`
             : prv ? `fill="#fff" stroke="var(--org)" stroke-width="1.6" opacity="0.85"`
                   : `fill="var(--org)"`;
    const cx=x(i).toFixed(1), cy=y(s.performance[i]).toFixed(1);
    pts+=`<circle class="pt" data-i="${i}" cx="${cx}" cy="${cy}" r="${low?3.4:3.2}" ${mk}/>`+
      `<circle class="pt hit" data-i="${i}" cx="${cx}" cy="${cy}" r="11" fill="transparent"/>`;
  }
  return `<svg viewBox="0 0 ${W} ${H}" width="100%">${g}${mark}${natpath}${tline}${line}${xl}${pts}</svg>`;
}

function attachTips(s){
  const box=document.getElementById("chartbox");
  box.querySelectorAll(".pt").forEach(c=>{
    c.addEventListener("mouseenter",()=>showTip(+c.dataset.i, s));
  });
  box.addEventListener("mouseleave",hideTip);
}
function showTip(i, s){
  if(i<0||i>=s.performance.length) return;
  const tip=document.getElementById("tip"); if(!tip) return;
  const sc=bigScales(s, ACTIVE_NAT);
  const fin=s.data_status[i]==="final";
  tip.innerHTML=
    `${tipMonth(s.months[i])} &middot; <span class="pct">${fmt(s.performance[i])}</span><br>`+
    `${(+s.within_target[i]).toLocaleString()} of ${(+s.total[i]).toLocaleString()} `+
    `&middot; <span class="st ${fin?'fin':'prov'}">${fin?'final':'provisional'}</span>`;
  tip.style.left=(sc.x(i)/BG.W*100)+"%";
  tip.style.top =(sc.y(s.performance[i])/BG.H*100)+"%";
  tip.style.display="block";
}
function hideTip(){const t=document.getElementById("tip"); if(t)t.style.display="none";}

init();
</script>
</body>
</html>
