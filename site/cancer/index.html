<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NHS Cancer Waiting Times Dashboard</title>
<style>
  :root{
    /* Clinical chart-paper palette: cool slate ink, a single signal-amber for
       the target line, restrained teal for the org series. */
    --ink:#11202b; --ink-soft:#4a5a64; --line:#d7e0e3; --paper:#fbfcfc;
    --panel:#ffffff; --org:#0f7d8c; --org-muted:#6db0ba; --nat:#9aa7ad; --target:#c8881d;
    --good:#2f7d4f; --bad:#b23b3b; --grid:#eef3f4;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    line-height:1.5}
  .wrap{max-width:1040px;margin:0 auto;padding:32px 24px 80px}
  header{border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:8px}
  h1{font-size:30px;margin:0 0 2px;letter-spacing:-.01em}
  .sub{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:12px;
    text-transform:uppercase;letter-spacing:.14em;color:var(--ink-soft)}
  .controls{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;
    margin:22px 0 10px}
  label{display:block;font-family:ui-monospace,Menlo,monospace;font-size:11px;
    text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);margin-bottom:5px}
  select,input[type=search]{font:inherit;font-size:15px;padding:8px 10px;
    border:1px solid var(--line);border-radius:5px;background:#fff;min-width:360px}
  .orgname{font-size:13px;color:var(--ink-soft);display:inline-block;margin:0 0 0 12px;vertical-align:middle}
  /* Empty byline (England, or a region-less provider) generates no inline box, so
     the .orgrow collapses to zero height instead of leaving a blank line. */
  .orgname:empty{display:none}
  .orgname b{color:var(--ink)}
  /* Org type buttons (National / Providers / Commissioners) */
  .typebtns{display:inline-flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;margin-bottom:8px}
  .typebtn{font:inherit;font-size:13.5px;padding:7px 15px;border:0;border-right:1px solid var(--line);
    background:#fff;cursor:pointer;color:var(--ink-soft)}
  .typebtn:last-child{border-right:0}
  .typebtn:hover{background:var(--grid)}
  .typebtn.active{background:var(--org);color:#fff}
  /* Provider-type sub-filter (Providers view only) — between the type buttons and the dropdown. */
  .ptyperow{margin:0 0 6px}
  .ptyperow[hidden]{display:none}
  .ptyperow label{margin-bottom:4px}
  .orgbtnwrap{display:inline-block;vertical-align:middle}
  .orgbtnwrap .filterbtn{min-width:380px}
  .filterbtn[disabled],.orgbtnwrap[hidden]{display:none}
  /* In-panel search box for the searchable dropdowns (scoped to beat the global
     input[type=search] min-width so it fits the panel). */
  .filterpanel .dropsearch{display:block;width:100%;min-width:0;font:inherit;font-size:14px;padding:7px 9px;
    margin-bottom:6px;border:1px solid var(--line);border-radius:5px}
  .note{background:#fff7e8;border:1px solid #f0dcae;border-left:3px solid var(--target);
    padding:10px 13px;font-size:13.5px;color:#6b561f;border-radius:0 4px 4px 0;margin:14px 0 22px}
  /* Contextual org-lifecycle note (former/newly-formed) — neutral, distinct from the amber break note. */
  .orgnote{background:var(--grid);border:1px solid var(--line);border-left:3px solid var(--org);
    padding:9px 12px;font-size:13px;color:var(--ink-soft);border-radius:0 4px 4px 0;margin:2px 0 16px}
  .orgnote[hidden]{display:none}
  .orgnote b{color:var(--ink)}
  .orgnote .rellink{background:none;border:0;padding:0;font:inherit;color:var(--org);
    text-decoration:underline;cursor:pointer}
  .orgnote .rellink:hover{color:var(--org-strong,var(--org))}

  /* Shared cancer-group selector (drives all three cards + the big chart) */
  .groupbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:4px 0 16px}
  .groupbar .flabel{font-family:ui-monospace,Menlo,monospace;font-size:11px;
    text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft)}
  .groupbar .filterbtn{min-width:240px}
  .groupbar .filterbtn.grouped{border-color:var(--org);color:var(--org);font-weight:600;
    box-shadow:0 1px 6px rgba(15,125,140,.10)}

  /* Three summary cards = the standard switcher */
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:0 0 22px}
  @media(max-width:780px){.cards{grid-template-columns:1fr}}
  .scard{background:var(--panel);border:1px solid var(--line);border-radius:8px;
    padding:13px 15px 11px;cursor:pointer;position:relative;
    transition:border-color .12s,box-shadow .12s;border-top:3px solid var(--line)}
  .scard:hover{border-color:#bcccd1}
  .scard.active{border-top-color:var(--org);box-shadow:0 1px 0 var(--org) inset, 0 2px 10px rgba(15,125,140,.10)}
  .scard h3{margin:0;font-size:14.5px;letter-spacing:-.005em}
  .scard .stdcode{font-family:ui-monospace,Menlo,monospace;font-size:10.5px;
    text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft)}
  .scard .figure{display:flex;align-items:baseline;gap:8px;margin:6px 0 2px}
  .scard .figure b{font-size:27px;font-weight:600;letter-spacing:-.02em;line-height:1;
    color:var(--ink);font-family:inherit}
  .scard .figure .vs{font-size:11px;color:var(--ink-soft);font-family:ui-monospace,Menlo,monospace}
  .scard .figure .vs.meets{color:var(--good)} .scard .figure .vs.under{color:var(--target)}
  .scard .spark{margin-top:6px}
  .scard .mon{font-family:ui-monospace,Menlo,monospace;font-size:10.5px;color:var(--ink-soft);margin-top:3px}
  .scard .mon .lowtag{color:#8a6d1f}                 /* n<10 caveat, matches low-reliability hue */
  .scard.nodata{opacity:.72}
  .scard .figure b.muted{color:var(--org-muted)}     /* thin latest figure reads as de-emphasised */
  .scard .nogroup{font-size:13px;color:var(--ink-soft);margin:10px 0 8px}

  /* Big chart panel */
  .bigpanel{background:var(--panel);border:1px solid var(--line);border-radius:8px;
    padding:16px 18px 12px;position:relative}
  .bigpanel .ttl{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin:0 0 6px}
  .bigpanel .ttl h2{margin:0;font-size:18px;letter-spacing:-.01em}
  .bigpanel .ttl .tag{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--ink-soft)}
  /* Legend: single line — org series + its uncertain states, a "|" boundary, then the
     reference lines. Wraps gracefully on narrow widths; one line at normal width. */
  .legend{display:flex;flex-wrap:wrap;align-items:center;gap:7px;
    font-family:ui-monospace,Menlo,monospace;font-size:11px;
    color:var(--ink-soft);margin:2px 0 4px}
  .legend .lgitem{display:inline-flex;align-items:center;white-space:nowrap}
  .legend .lgsep{opacity:.4}
  .legend .lgbar{opacity:.4;padding:0 3px}              /* "|" group boundary */
  .chartbox{position:relative}
  .chartbox svg{display:block;width:100%;height:auto}
  .pt{cursor:pointer}
  /* Anchored tooltip */
  .tip{position:absolute;z-index:5;transform:translate(-50%,-118%);pointer-events:none;
    background:var(--ink);color:#fff;border-radius:6px;padding:7px 10px;
    font-family:ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.45;
    white-space:nowrap;box-shadow:0 3px 12px rgba(17,32,43,.25);display:none}
  .tip .pct{font-size:14px;font-weight:600}
  .tip .st{text-transform:uppercase;letter-spacing:.06em}
  .tip .prov{color:#f0c870} .tip .fin{color:#9be0b4}
  .tip::after{content:"";position:absolute;left:50%;top:100%;transform:translateX(-50%);
    border:5px solid transparent;border-top-color:var(--ink)}

  /* Breakdown filter (custom dropdown so options are in-DOM + reviewable) */
  .filterbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:2px 0 8px}
  .filterbar .flabel{font-family:ui-monospace,Menlo,monospace;font-size:11px;
    text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft)}
  .fgrp{display:inline-flex;align-items:center;gap:8px}
  .fgrp[hidden]{display:none}
  .fdrop{position:relative}
  .filterbtn{font:inherit;font-size:14px;padding:6px 12px;border:1px solid var(--line);
    border-radius:5px;background:#fff;cursor:pointer;color:var(--ink);min-width:200px;text-align:left}
  .filterbtn:hover{border-color:#bcccd1}
  .filterbtn .caret{float:right;color:var(--ink-soft);margin-left:8px}
  .filterpanel{position:absolute;z-index:8;top:calc(100% + 4px);left:0;min-width:280px;max-width:340px;
    max-height:340px;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:6px;
    box-shadow:0 6px 22px rgba(17,32,43,.16);padding:6px}
  .filterpanel[hidden]{display:none}
  .fgroup{font-family:ui-monospace,Menlo,monospace;font-size:10px;text-transform:uppercase;
    letter-spacing:.1em;color:var(--ink-soft);padding:8px 8px 3px;border-top:1px solid var(--grid);margin-top:4px}
  .fgroup.first{border-top:0;margin-top:0}
  .fopt{display:block;width:100%;text-align:left;font:inherit;font-size:13.5px;padding:5px 8px;
    border:0;background:none;border-radius:4px;cursor:pointer;color:var(--ink)}
  .fopt:hover{background:var(--grid)}
  .fopt.active{background:rgba(15,125,140,.10);color:var(--org);font-weight:600}
  .slicehint{font-size:12px;color:var(--ink-soft)}
  .lowrel{font-size:12.5px;color:#6b561f;background:#fff7e8;border:1px solid #f0dcae;
    border-left:3px solid var(--target);border-radius:0 4px 4px 0;padding:7px 11px;margin:8px 0 2px}
  .lowrel[hidden]{display:none}
  .emptyslice{padding:40px 10px;text-align:center;color:var(--ink-soft);font-size:14px}

  footer{margin-top:42px;border-top:1px solid var(--line);padding-top:16px;
    font-size:12.5px;color:var(--ink-soft)}
  a{color:var(--org)}
  svg text{font-family:ui-monospace,Menlo,monospace}

  /* Chart toolbar (Expand + Download) — lives inside .ttl so it travels with the
     panel when it is moved into the expand modal, and so export always reads the
     on-screen state regardless of which view is active. */
  .charttools{margin-left:auto;display:inline-flex;gap:8px;align-items:center}
  .toolbtn{font:inherit;font-size:12.5px;padding:5px 11px;border:1px solid var(--line);
    border-radius:5px;background:#fff;cursor:pointer;color:var(--ink-soft);white-space:nowrap}
  .toolbtn:hover{border-color:#bcccd1;color:var(--ink)}
  .dlmenu{left:auto;right:0;min-width:160px}
  .dlmenu .fopt{font-size:13.5px}

  /* Expand modal: a fullscreen overlay the .bigpanel is MOVED into (and back out of
     on close), so every existing control — route/modality dropdowns, legend,
     tooltips — keeps working without duplicated IDs or re-wiring. */
  .modal{position:fixed;inset:0;z-index:50;display:flex}
  .modal[hidden]{display:none}
  .modal-backdrop{position:absolute;inset:0;background:rgba(17,32,43,.55)}
  .modal-inner{position:relative;margin:auto;width:min(1240px,96vw);max-height:95vh;
    overflow:auto;background:var(--paper);border-radius:10px;
    box-shadow:0 14px 54px rgba(17,32,43,.42);padding:16px}
  .modal-close{position:absolute;top:12px;right:14px;z-index:2;font-size:17px;line-height:1;
    border:1px solid var(--line);background:#fff;border-radius:6px;padding:6px 10px;
    cursor:pointer;color:var(--ink-soft)}
  .modal-close:hover{color:var(--ink);border-color:#bcccd1}
  .modal-host .bigpanel{border:0;padding:8px 6px 4px}

  /* Time-range presets: a compact segmented control, right-aligned in the filterbar. */
  .rangewrap{margin-left:auto;display:inline-flex;align-items:center;gap:8px}
  .rangebtns{display:inline-flex;border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .rangebtn{font:inherit;font-size:12.5px;padding:5px 11px;border:0;border-right:1px solid var(--line);
    background:#fff;cursor:pointer;color:var(--ink-soft);white-space:nowrap}
  .rangebtn:last-child{border-right:0}
  .rangebtn:hover{background:var(--grid)}
  .rangebtn.active{background:var(--org);color:#fff}

  /* "Show England" toggle — overrides the global uppercase/block label defaults. */
  .engtoggle{display:inline-flex;align-items:center;gap:6px;margin:0;cursor:pointer;
    font:inherit;font-size:13px;text-transform:none;letter-spacing:0;color:var(--ink)}
  .engtoggle input{margin:0;cursor:pointer;accent-color:var(--org)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>NHS Cancer Waiting Times Dashboard</h1>
    <div class="sub">England &middot; Performance against NHS Cancer Waiting Time Targets</div>
    <div style="font-family:ui-monospace,Menlo,monospace;font-size:12px;margin-top:8px">
      <a href="compare.html" style="color:var(--org);text-decoration:none">Compare Providers (Beta) &rarr;</a>
      <span style="color:var(--line);margin:0 8px">|</span>
      <a href="../rtt/" style="color:var(--org);text-decoration:none">RTT Waiting Times Dashboard &rarr;</a>
      <span style="color:var(--line);margin:0 8px">|</span>
      <a href="../" style="color:var(--ink-soft);text-decoration:none">All dashboards</a>
    </div>
  </header>

  <div class="controls">
    <div>
      <label>Organisation</label>
      <div class="typebtns" id="typebtns">
        <button type="button" class="typebtn" data-type="national">England</button>
        <button type="button" class="typebtn" data-type="provider">Providers</button>
        <button type="button" class="typebtn" data-type="icb">Commissioners</button>
      </div>
      <!-- Provider-type sub-filter: scopes the org dropdown (Providers view only). Default NHS Trusts. -->
      <div class="ptyperow" id="ptyperow" hidden>
        <label>Provider type</label>
        <div class="typebtns" id="ptypebtns">
          <button type="button" class="typebtn ptypebtn" data-ptype="trust">NHS Trusts</button>
          <button type="button" class="typebtn ptypebtn" data-ptype="independent">Independent Sector</button>
        </div>
      </div>
      <!-- Dropdown + inline region on their OWN row below the type buttons (so the
           provider view mirrors the commissioner layout: buttons, then dropdown). -->
      <div class="orgrow">
        <div class="fdrop orgbtnwrap" id="orgdrop">
          <button id="orgbtn" class="filterbtn" aria-haspopup="listbox" aria-expanded="false">
            <span id="orglabel">England — all-England</span><span class="caret">&#9662;</span></button>
          <div id="orgpanel" class="filterpanel" role="listbox" hidden>
            <input id="orgsearch" class="dropsearch" type="search" autocomplete="off"
              placeholder="Type a trust or ICB name or code&hellip;">
            <div id="orgoptions"></div>
          </div>
        </div>
        <div class="orgname" id="orgname"></div>
      </div>
    </div>
  </div>

  <!-- Contextual org-lifecycle note: shown when a former / newly-formed org is selected. -->
  <div class="orgnote" id="orgnote" hidden></div>

  <!-- Shared cancer-group filter: drives all three cards AND the big chart together. -->
  <div class="groupbar" id="groupbar">
    <span class="flabel">Cancer group</span>
    <div class="fdrop">
      <button id="groupbtn" class="filterbtn" aria-haspopup="listbox" aria-expanded="false">
        <span id="grouplabel">All cancers</span><span class="caret">&#9662;</span></button>
      <div id="grouppanel" class="filterpanel" role="listbox" hidden></div>
    </div>
    <span id="grouphint" class="slicehint"></span>
  </div>

  <!-- Three summary cards: latest figure + sparkline; clicking one switches the big chart. -->
  <div class="cards" id="cards"></div>

  <!-- One large time-series chart for the selected standard. -->
  <div class="bigpanel" id="bigpanel">
    <div class="ttl"><h2 id="bigttl"></h2><span class="tag" id="bigtag"></span>
      <span class="charttools" id="charttools">
        <button type="button" id="expandbtn" class="toolbtn" title="Open the chart full-screen">&#10530; Expand</button>
        <span class="fdrop" style="display:inline-block">
          <button type="button" id="dlbtn" class="toolbtn" aria-haspopup="true" aria-expanded="false"
            title="Download the chart as an image">&#10515; Download &#9662;</button>
          <div id="dlpanel" class="filterpanel dlmenu" hidden>
            <button type="button" class="fopt" id="dlpng">PNG image</button>
            <button type="button" class="fopt" id="dlsvg">SVG vector</button>
          </div>
        </span>
      </span>
    </div>
    <div class="filterbar">
      <span class="fgrp" id="routewrap">
        <span class="flabel">Referral route</span>
        <div class="fdrop">
          <button id="filterbtn" class="filterbtn" aria-haspopup="listbox" aria-expanded="false">
            <span id="filterlabel">All routes</span><span class="caret">&#9662;</span></button>
          <div id="filterpanel" class="filterpanel" role="listbox" hidden></div>
        </div>
      </span>
      <span class="fgrp" id="modwrap" hidden>
        <span class="flabel">Treatment modality</span>
        <div class="fdrop">
          <button id="modbtn" class="filterbtn" aria-haspopup="listbox" aria-expanded="false">
            <span id="modlabel">All modalities</span><span class="caret">&#9662;</span></button>
          <div id="modpanel" class="filterpanel" role="listbox" hidden></div>
        </div>
      </span>
      <span class="fgrp" id="engwrap">
        <label class="engtoggle"><input type="checkbox" id="engchk" checked> Show England</label>
      </span>
      <span id="slicehint" class="slicehint"></span>
      <span class="rangewrap" id="rangewrap">
        <span class="flabel">Time range</span>
        <span class="rangebtns" id="rangebtns">
          <button type="button" class="rangebtn" data-range="3y">3 years</button>
          <button type="button" class="rangebtn" data-range="12m">12 months</button>
          <button type="button" class="rangebtn" data-range="all">All</button>
        </span>
      </span>
    </div>
    <div class="legend" id="legend"></div>
    <div class="chartbox" id="chartbox"></div>
    <div id="lowrel" class="lowrel" hidden></div>
  </div>

  <!-- Oct-2023 comparability banner: sits BELOW the chart (the dashed in-chart
       marker on CMB31/CMB62 flags the break point itself). -->
  <div class="note" id="breaknote">Loading&hellip;</div>

  <footer id="foot"></footer>
</div>

<!-- Expand overlay. The .bigpanel is moved into #modalhost on open and restored on
     close (see openModal/closeModal), so the expanded chart IS the live chart —
     route/modality dropdowns, tooltips and export all keep working. -->
<div id="chartmodal" class="modal" hidden>
  <div class="modal-backdrop" id="modalbackdrop"></div>
  <div class="modal-inner">
    <button type="button" class="modal-close" id="modalclose" title="Close (Esc)">&#10005;</button>
    <div class="modal-host" id="modalhost"></div>
  </div>
</div>

<script>
const DATA = "data/";
// Cache-bust: every data file (except meta.json itself) is fetched with a build-version
// token derived from meta.built_at, so a new index.html can never pair with a browser-
// or CDN-cached index.json from a previous build. meta.json is fetched no-store so the
// token always reflects the latest deployed build (it's tiny). Set in init().
let DV="";
const durl = path => DATA+path+(DV?(path.includes("?")?"&":"?")+"v="+DV:"");
const NATIONAL_CODE = "__NATIONAL__";
const DEFAULT_STD = "CMB62";            // 62-day combined is the most-watched
const THRESH = 10;                      // pipeline RELIABILITY_THRESHOLD: denom < this = low-reliability
let META=null, NATIONAL=null, CURRENT=null, CURRENT_STD=DEFAULT_STD;
let CURRENT_TYPE="national";                   // national | provider | icb (org type buttons)
let PTYPE="trust";                             // provider-type filter: trust | independent (default NHS Trusts)
const ptypeOf = o => o.ptype==="independent" ? "independent" : "trust";  // absent => NHS trust
// Composite breakdown state (v6). Three independent axes:
//   GROUP  — null = All cancers, else one of the ten tumour-site groups. The
//            page-level shared selector; drives the cards + chart and PERSISTS
//            across org / standard switches.
//   ROUTE  — null = All routes, else a referral route. Group-aware: when a group
//            is selected the route list narrows to that group's real routes.
//   MOD    — null = All modalities, else a treatment modality. ALL-CANCERS ONLY
//            (CMB31/CMB62) and only beneath a selected route — the cancer x route
//            x modality three-way isn't published, so modality can't nest under a
//            group. Selecting a group hides AND resets it (see selectGroup).
let GROUP=null, ROUTE=null, MOD=null;
// Big-chart time-range: a FIXED rolling window (last-N months) so the chart stays a
// constant width as NHS publishes more months. Default 3 years; applies to ALL
// standards (not standard-aware). "all" = the full series. Display-only — the cards'
// own recent-trend sparklines are unaffected.
const RANGE_MONTHS={"3y":36,"12m":12,"all":Infinity};
let RANGE="3y";
// Show/hide the grey England comparison overlay (providers + commissioners only).
// Default ON. On the England tab the org's own line IS England, so the toggle is
// hidden there. Persists across org/standard switches and carries into the expand
// modal + image export (both read the on-screen chart).
let SHOW_ENGLAND=true;
// NHS England's ten tumour-site groups (matches pipeline/cancer_groups.TEN_GROUPS,
// the order NHS England's dashboard lists them).
const CANCER_GROUPS=["Breast","Gynaecology","Haematology","Head & Neck","Lower GI",
  "Lung","Other","Skin","Upper GI","Urology"];
const isGroupSlice = () => GROUP!==null;
// Is any narrowing beyond all-cancers active (for chart titles / tags)?
const sliceOnNow = () => GROUP!==null || ROUTE!==null || MOD!==null;
let BREAKDOWN=null;                            // current org's breakdown file (lazy)
let NATIONAL_BREAKDOWN=null;                   // national breakdown (lazy, cached)
let ACTIVE_NAT=null;                           // national series currently overlaid (for tooltip scaling)

const ABBR=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const fmt = p => (p*100).toFixed(1)+"%";
const monthLabel = m => {const[y,mm]=m.split("-");return ABBR[+mm-1]+" "+y.slice(2);};
const tipMonth   = m => {const[y,mm]=m.split("-");return ABBR[+mm-1]+" "+y;};
const _MN=["January","February","March","April","May","June","July","August","September","October","November","December"];
const fullMonth = m => {const[y,mm]=m.split("-");return _MN[+mm-1]+" "+y;};
const isoDate = iso => {const[y,m,d]=iso.slice(0,10).split("-");return (+d)+" "+_MN[+m-1]+" "+y;};

function footerHTML(META){
  const latest=fullMonth(META.months[META.months.length-1]), built=isoDate(META.built_at);
  return `Data source: <a href="https://www.england.nhs.uk/statistics/statistical-work-areas/cancer-waiting-times/" target="_blank" rel="noopener">NHS England Cancer Waiting Times statistics</a>, published monthly and used here under the Open Government Licence v3.0. This dashboard is an independent tool and is not affiliated with or endorsed by NHS England.<br><br>`+
    `Data to ${latest}. Last updated ${built}. Figures for the most recent months are provisional and subject to revision.<br><br>`+
    // Transparency note for the picker hiding (see build_site_data._negligible_orgs).
    `Some organisations are hidden from the selectors because they have too little recent cancer activity to give a reliable picture — for providers, no standard reaching at least 10 patients in a single month over the last year; for commissioners, very low recent total volume.`;
  // (The Oct-2023 comparability note now lives in the amber banner below the chart
  //  + the in-chart marker, so the old third footer line would be redundant.)
}

async function init(){
  META = await (await fetch(DATA+"meta.json",{cache:"no-store"})).json();
  DV = (META.built_at||"").replace(/\D/g,"");   // build-version token for all other data fetches
  document.getElementById("foot").innerHTML = footerHTML(META);
  NATIONAL = await (await fetch(durl("national.json"))).json();
  const idx = await (await fetch(durl("index.json"))).json();
  window._idx = idx;
  document.getElementById("breaknote").innerHTML = "&#9888; "+META.note;
  // Org type buttons + searchable org dropdown
  document.querySelectorAll("#typebtns .typebtn").forEach(b=>b.addEventListener("click",()=>setType(b.dataset.type)));
  document.querySelectorAll("#ptypebtns .ptypebtn").forEach(b=>b.addEventListener("click",()=>setPtype(b.dataset.ptype)));
  document.getElementById("orgbtn").addEventListener("click", toggleOrgPanel);
  document.getElementById("orgsearch").addEventListener("input", e=>buildOrgOptions(e.target.value));
  document.getElementById("orgsearch").addEventListener("keydown", dropSearchKey);
  document.getElementById("filterbtn").addEventListener("click", togglePanel);
  document.getElementById("modbtn").addEventListener("click", toggleModPanel);
  document.getElementById("groupbtn").addEventListener("click", toggleGroupPanel);
  document.addEventListener("click", e=>{ if(!e.target.closest(".fdrop")){ closePanel(); closeModPanel(); closeOrgPanel(); closeGroupPanel(); closeDlPanel(); } });
  // Expand modal + image download controls (live in .ttl, inside .bigpanel).
  document.getElementById("expandbtn").addEventListener("click", toggleExpand);
  document.getElementById("modalclose").addEventListener("click", closeModal);
  document.getElementById("modalbackdrop").addEventListener("click", closeModal);
  document.addEventListener("keydown", e=>{ if(e.key==="Escape" && EXPANDED) closeModal(); });
  document.getElementById("dlbtn").addEventListener("click", toggleDlPanel);
  document.getElementById("dlpng").addEventListener("click", ()=>{ closeDlPanel(); downloadChart("png"); });
  document.getElementById("dlsvg").addEventListener("click", ()=>{ closeDlPanel(); downloadChart("svg"); });
  document.querySelectorAll(".rangebtn").forEach(b=>b.addEventListener("click", ()=>setRange(b.dataset.range)));
  document.getElementById("engchk").addEventListener("change", e=>setShowEngland(e.target.checked));

  // Deep-link / render hooks: ?org=CODE, ?std=CMB31, ?slice=type:value, ?panel=open.
  const qs = new URLSearchParams(location.search);
  const qStd = (qs.get("std")||"").toUpperCase();
  if(META.standards[qStd]) CURRENT_STD = qStd;
  const qRange = qs.get("range");                 // render/deep-link hook: ?range=3y|12m|all
  if(qRange && (qRange in RANGE_MONTHS)) RANGE = qRange;
  if(qs.get("england")==="off") SHOW_ENGLAND=false;   // deep-link hook: ?england=off
  const qOrg = qs.get("org");
  // Shared cancer group can be set before the org loads so it persists through it.
  const qGroup = qs.get("group");
  if(qGroup && CANCER_GROUPS.includes(qGroup)) GROUP=qGroup;
  const qo = qOrg && qOrg!==NATIONAL_CODE && idx.find(o=>o.code===qOrg);
  if(qo) await setType(qo.level, qo.code);   // select a specific org via its type
  else await setType("national");            // default anchor: National
  // Deep-link / render hooks for the breakdown axes: ?route=, ?mod=.
  const qRoute = qs.get("route"), qMod = qs.get("mod");
  if(qRoute!=null || qMod!=null){
    await ensureBreakdown();
    if(qRoute!=null && routesForContext(CURRENT_STD).includes(qRoute)) ROUTE=qRoute;
    if(qMod!=null && modalityApplicable() && modsForRoute(CURRENT_STD,ROUTE).includes(qMod)) MOD=qMod;
    syncBreakdownUI(); renderCards(); renderBig();
  }
  if(qs.get("panel")==="open") await openPanel();
  if(qs.get("modpanel")==="open") await openModPanel();
  if(qs.get("gopen")!=null) openGroupPanel();   // render hook: open the shared group dropdown
  if(qs.get("expand")==="open") openModal();    // render hook: open the expand modal
  const qOrgq=qs.get("orgq");   // render hook: open the org dropdown mid-search
  if(qOrgq!=null && CURRENT_TYPE!=="national"){
    openOrgPanel();
    const e=document.getElementById("orgsearch"); e.value=qOrgq; buildOrgOptions(qOrgq);
  }
}

// Org type: National (no dropdown) / Providers / Commissioners. Switching to a
// provider/ICB type defaults to the first org alphabetically so the chart is
// never blank. `code` optionally selects a specific org (deep link).
async function setType(type, code){
  CURRENT_TYPE=type;
  document.querySelectorAll("#typebtns .typebtn").forEach(b=>b.classList.toggle("active", b.dataset.type===type));
  closeOrgPanel();
  const drop=document.getElementById("orgdrop");
  if(type==="national"){
    document.getElementById("ptyperow").hidden=true;
    drop.hidden=true;
    document.getElementById("orglabel").textContent="England — all-England";
    await loadNational();
    return;
  }
  // Provider-type filter shows for Providers only. DEEP-LINK SAFETY: when a specific
  // org is requested, the filter FOLLOWS that org's type so the link is never hidden;
  // otherwise default to NHS Trusts.
  if(type==="provider"){
    const e=code && window._idx.find(o=>o.code===code);
    PTYPE = e ? ptypeOf(e) : "trust";
    document.getElementById("ptyperow").hidden=false;
    updatePtypeButtons();
  } else {
    document.getElementById("ptyperow").hidden=true;
  }
  drop.hidden=false;
  const list=orgListFor(type);
  // A direct ?org= link may target a HIDDEN org (negligible activity, out of the
  // picker but still reachable): resolve `code` against the FULL index, falling
  // back to the first visible org so the chart never blanks.
  const full=window._idx.filter(o=>o.level===type);
  const pick=(code && full.find(o=>o.code===code)) || list[0];
  if(!pick) return;
  document.getElementById("orglabel").textContent=`${pick.name} (${pick.code})`;
  buildOrgOptions("");
  await loadOrg(pick.code);
}
// Provider-type sub-filter: re-scope the dropdown to the chosen type, then select
// its first org so the chart never blanks.
function setPtype(pt){
  if(pt===PTYPE || CURRENT_TYPE!=="provider") return;
  PTYPE=pt; updatePtypeButtons(); closeOrgPanel();
  const list=orgListFor("provider"); buildOrgOptions("");
  if(list.length){ document.getElementById("orglabel").textContent=`${list[0].name} (${list[0].code})`; loadOrg(list[0].code); }
}
function updatePtypeButtons(){
  document.querySelectorAll("#ptypebtns .ptypebtn").forEach(b=>b.classList.toggle("active", b.dataset.ptype===PTYPE));
}
// Picker list: orgs of this type EXCLUDING negligible-activity ones flagged
// hidden in index.json (computed each build). Hidden orgs stay direct-linkable
// (see setType). Providers are further scoped by the provider-type filter.
function orgListFor(type){
  let list=window._idx.filter(o=>o.level===type && !o.hidden);
  if(type==="provider") list=list.filter(o=>ptypeOf(o)===PTYPE);   // provider-type filter (ODS role)
  return list.sort((a,b)=>a.name.localeCompare(b.name));
}
// Commissioner sub-grouping off the org NAME: ICB vs Other (national hubs).
// Providers are scoped by the ODS-role provider-type FILTER, so they need no
// name-based grouping inside the list (the old name heuristic was the murky part).
function orgGroupOf(o){
  if(o.former) return "Former organisations";   // closed/superseded per ODS — own group, still selectable
  const u=(o.name||"").toUpperCase();
  if(o.level==="icb") return u.includes("INTEGRATED CARE BOARD") ? "ICB" : "Other";
  return "Current";
}
// Searchable, GROUPED option list. Providers: type filter scopes the list, so just
// split current vs Former (no redundant type header). Commissioners: ICB/Other/Former.
function buildOrgOptions(q){
  const host=document.getElementById("orgoptions"); host.innerHTML="";
  q=(q||"").trim().toLowerCase();
  const list=orgListFor(CURRENT_TYPE).filter(o=> !q || o.name.toLowerCase().includes(q) || o.code.toLowerCase().includes(q));
  if(!list.length){ host.innerHTML='<div class="fgroup first">No matches</div>'; return; }
  // Former (closed/superseded per ODS) orgs bucketed last but still SELECTABLE —
  // history stays viewable (valuable right after a merger). Inactivity hides later.
  const groups = CURRENT_TYPE==="icb"
    ? [["ICB","ICB"],["Other","Other"],["Former organisations","Former organisations"]]
    : [["Current",null],["Former organisations","Former organisations"]];
  let first=true;
  for(const [key,label] of groups){
    const items = key==="Current" ? list.filter(o=>!o.former) : list.filter(o=>orgGroupOf(o)===key);
    if(!items.length) continue;
    if(label){ const h=document.createElement("div"); h.className="fgroup"+(first?" first":""); h.textContent=label; host.appendChild(h); }
    first=false;
    items.forEach(o=>{ const b=document.createElement("button");
      b.className="fopt"+(CURRENT && CURRENT.code===o.code ? " active":"");
      b.setAttribute("role","option"); b.textContent=`${o.name} (${o.code})`;
      b.onclick=()=>selectOrg(o); host.appendChild(b); });
  }
}
function selectOrg(o){
  document.getElementById("orglabel").textContent=`${o.name} (${o.code})`;
  closeOrgPanel(); loadOrg(o.code);
}
function toggleOrgPanel(){ const p=document.getElementById("orgpanel"); if(p && !p.hidden) closeOrgPanel(); else openOrgPanel(); }
function openOrgPanel(){
  if(CURRENT_TYPE==="national") return;
  const p=document.getElementById("orgpanel"), s=document.getElementById("orgsearch");
  s.value=""; buildOrgOptions("");
  p.hidden=false; document.getElementById("orgbtn").setAttribute("aria-expanded","true");
  // Reopen on an already-selected org: scroll it into view (it carries .active),
  // rather than starting from the top of a long list. Focus without scrolling so
  // the search box doesn't yank the panel back up.
  setTimeout(()=>{
    const act=p.querySelector(".fopt.active");
    if(act) act.scrollIntoView({block:"nearest"});
    s.focus({preventScroll:true});
  },0);
}
function closeOrgPanel(){ const p=document.getElementById("orgpanel"); if(p)p.hidden=true;
  const b=document.getElementById("orgbtn"); if(b)b.setAttribute("aria-expanded","false"); }
// Shared keyboard handler for in-panel search inputs: Enter picks first match, Esc closes.
function dropSearchKey(e){
  if(e.key==="Enter"){ const f=e.target.parentElement.querySelector(".fopt"); if(f){e.preventDefault();f.click();} }
  else if(e.key==="Escape"){ closeOrgPanel(); closePanel(); closeModPanel(); }
}

// On an org/standard switch the shared cancer GROUP persists (page-level), but
// the route/modality narrowing resets: route values differ by standard, and a
// freshly-loaded org's breakdown may not publish the previously-picked slice.
function resetSliceForSwitch(){ ROUTE=null; MOD=null; }
// When a group is active we need the breakdown file loaded before render (the
// cards + chart read the group's series from it).
async function ensureForGroup(){ if(isGroupSlice()) await ensureBreakdown(); }

async function loadNational(){
  // national.json carries only {standards}; wrap it with identifying fields.
  CURRENT = Object.assign({code:NATIONAL_CODE, name:"England", level:"national",
    region:"England", isNational:true}, NATIONAL);
  BREAKDOWN=null; resetSliceForSwitch();
  renderOrgNote(null);
  await ensureForGroup();
  render();
}
async function loadOrg(code){
  CURRENT = await (await fetch(durl("org/"+code+".json"))).json();
  CURRENT.isNational=false;
  BREAKDOWN=null; resetSliceForSwitch();   // breakdown is per-org; refetch lazily
  renderOrgNote(code);
  await ensureForGroup();
  render();
}

// Jump to a related org (a successor / predecessor from the ODS change note).
function goToOrg(code){
  const e=(window._idx||[]).find(o=>o.code===code);
  if(e) setType(e.level, e.code);
}
const _monthYear = iso => { if(!iso) return ""; const[y,m]=iso.split("-"); return _MN[+m-1]+" "+y; };
// Generic, auto-generated lifecycle note (no hand-written per-merger text), built
// from the index entry's ODS succession fields. Former → "Closed … — see related:";
// newly-formed → "Formed … — see related:". Hidden when neither applies.
function renderOrgNote(code){
  const box=document.getElementById("orgnote");
  const e=code ? (window._idx||[]).find(o=>o.code===code) : null;
  if(!e || (!e.former && e.reltype!=="formed")){ box.hidden=true; box.innerHTML=""; return; }
  const rel=(e.related||[]).map(r=>{
    const known=(window._idx||[]).some(o=>o.code===r.code);
    return known ? `<button type="button" class="rellink" onclick="goToOrg('${r.code}')">${r.name}</button>`
                 : `${r.name} (${r.code})`;
  });
  let msg;
  if(e.former){
    const when=_monthYear(e.closed);
    msg=`<b>Closed${when?" "+when:""}.</b> This organisation was reorganised`+
        (rel.length?` — see related organisation${rel.length>1?"s":""}: ${rel.join(", ")}.`:".")+
        ` Its figures up to closure remain viewable here.`;
  } else {
    const when=_monthYear(e.opened);
    msg=`<b>Formed${when?" "+when:""}.</b> This is a new organisation`+
        (rel.length?`, drawing on the area${rel.length>1?"s":""} of: ${rel.join(", ")}.`:".")+
        ` Earlier months are not available under this code.`;
  }
  box.innerHTML=msg; box.hidden=false;
}

function render(){
  // If the org we switched to lacks the kept standard, fall back sensibly.
  if(!CURRENT.standards[CURRENT_STD])
    CURRENT_STD = META.standards[DEFAULT_STD] && CURRENT.standards[DEFAULT_STD]
      ? DEFAULT_STD : Object.keys(CURRENT.standards)[0];
  // Byline beside the dropdown: NHS region only (the org name is already in the
  // dropdown itself, so it's not lost). National shows nothing; region-less
  // national-scope providers (region === "England") also show nothing.
  document.getElementById("orgname").textContent = CURRENT.isNational
    ? ""
    : (CURRENT.region && CURRENT.region!=="England" ? CURRENT.region : "");
  closePanel(); closeModPanel(); updateGroupLabel();
  renderCards();
  renderBig();   // calls syncBreakdownUI() to sync the route/modality controls
}

/* ---- summary cards (the switcher) ---- */
// The series a card shows: the shared cancer group's series when one is selected
// (read from the loaded breakdown file), else the all-cancers headline. Returns
// null when a group is selected but not published for this standard at this org.
function cardSeries(std){
  const base=CURRENT.standards[std]; if(!base) return undefined;
  if(!isGroupSlice()) return base;          // cards follow the GROUP only (route/mod narrow the big chart, not the cards)
  const cg = BREAKDOWN && BREAKDOWN.standards[std] && BREAKDOWN.standards[std].cancer_group;
  const gs = cg && cg[GROUP];
  return gs ? Object.assign({target:base.target,label:base.label}, gs) : null;
}
function renderCards(){
  const host=document.getElementById("cards"); host.innerHTML="";
  const grouped=isGroupSlice();
  for(const std of Object.keys(META.standards)){
    const base=CURRENT.standards[std]; if(!base) continue;   // standard absent entirely → no card
    const s=cardSeries(std);
    const card=document.createElement("div");
    card.tabIndex=0; card.dataset.std=std;
    const title=base.label.split("(")[0].trim();
    if(grouped && !s){
      // Group not published for this standard at this org: keep the card (still a
      // standard switcher) but say so rather than drawing a misleading figure.
      card.className="scard nodata"+(std===CURRENT_STD?" active":"");
      card.innerHTML=
        `<div class="stdcode">${std} &middot; ${GROUP}</div>
         <h3>${title}</h3>
         <div class="nogroup">No <b>${GROUP}</b> figures published for this standard here.</div>`;
    } else {
      const last=s.performance.length-1, cur=s.performance[last], meets=cur>=s.target;
      const lowLast=(+s.total[last])<THRESH;   // thin latest month → de-emphasise
      card.className="scard"+(std===CURRENT_STD?" active":"");
      card.innerHTML=
        `<div class="stdcode">${std}${grouped?" &middot; "+GROUP:""}</div>
         <h3>${title}</h3>
         <div class="figure"><b class="${lowLast?'muted':''}">${fmt(cur)}</b>
           <span class="vs ${meets?'meets':'under'}">${meets?'&#10003; meets':'&#9660; below'} ${fmt(s.target)} target</span></div>
         <div class="spark">${sparkSVG(s)}</div>
         <div class="mon">latest ${tipMonth(s.months[last])} &middot; ${s.data_status[last]}`+
           (lowLast?` &middot; <span class="lowtag">n=${(+s.total[last])}, low reliability</span>`:``)+`</div>`;
    }
    const pick=()=>{ if(CURRENT_STD===std) return; CURRENT_STD=std;
      resetSliceForSwitch(); closePanel(); closeModPanel();   // keep the shared group, reset route/modality
      renderCards(); renderBig(); };  // cards + chart switch together (renderBig re-syncs the controls)
    card.addEventListener("click",pick);
    card.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();pick();}});
    host.appendChild(card);
  }
}

// Small recent-trend sparkline (last ~15 months). Amber dashed target rule sits
// clearly inside the plot (extra headroom), and the latest-point dot turns amber
// when below target so a rising-but-still-short trend can't read as healthy.
// Group series at one org can be thin/recent: UNCERTAIN months — provisional OR
// n<THRESH — are drawn in the lighter teal + dashed (matching the big chart's colour
// logic, where both uncertain states share --org-muted), so a thin/provisional group
// can't read as a confident sparkline. Colour only here — no circle/square markers
// (the sparkline carries none; too small). A sub-threshold latest point still shows as
// a hollow muted ring. (s.total / s.data_status are present on all series.)
function sparkSVG(s){
  const W=190,H=42,P=3;
  const k=Math.min(15,s.performance.length);
  const vals=s.performance.slice(-k);
  const tot=(s.total||[]).slice(-k);
  const sts=(s.data_status||[]).slice(-k);
  const low=i=> tot.length ? (+tot[i])<THRESH : false;
  const unc=i=> low(i) || (sts.length ? sts[i]!=="final" : false);  // uncertain = low-n OR provisional
  const meets=vals[vals.length-1]>=s.target;
  let lo=Math.min(...vals,s.target), hi=Math.max(...vals,s.target);
  const pad=(hi-lo)*0.22||0.02; lo-=pad; hi+=pad;  // headroom: keep target off the edge
  const x=i=>P+(i/((k-1)||1))*(W-2*P);
  const y=v=>P+(1-(v-lo)/((hi-lo)||1))*(H-2*P);
  const ty=y(s.target).toFixed(1);
  let path="";
  for(let i=0;i<k-1;i++){
    const seg=`M${x(i).toFixed(1)} ${y(vals[i]).toFixed(1)} L${x(i+1).toFixed(1)} ${y(vals[i+1]).toFixed(1)}`;
    path += (unc(i)||unc(i+1))
      ? `<path d="${seg}" fill="none" stroke="var(--org-muted)" stroke-width="1.4" stroke-dasharray="2 2" opacity="0.9"/>`
      : `<path d="${seg}" fill="none" stroke="var(--org)" stroke-width="1.8"/>`;
  }
  const last=k-1;
  const dot = low(last) ? `fill="#fff" stroke="var(--org-muted)" stroke-width="1.4"`
                        : `fill="${meets?'var(--org)':'var(--target)'}"`;
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}">
    <line x1="${P}" y1="${ty}" x2="${W-P}" y2="${ty}" stroke="var(--target)" stroke-dasharray="3 2" stroke-width="1.1"/>
    ${path}
    <circle cx="${x(last).toFixed(1)}" cy="${y(vals[last]).toFixed(1)}" r="2.8" ${dot}/>
  </svg>`;
}

/* ---- breakdown filtering (v6: group-aware route + all-cancers-only modality) ---- */
async function loadNationalBreakdown(){
  if(!NATIONAL_BREAKDOWN) NATIONAL_BREAKDOWN = await (await fetch(durl("national.breakdown.json"))).json();
  return NATIONAL_BREAKDOWN;
}
// Load-on-demand: only called when the user first opens a filter, picks a group, or a deep link.
async function ensureBreakdown(){
  await loadNationalBreakdown();
  if(CURRENT.isNational){ BREAKDOWN = NATIONAL_BREAKDOWN; return; }
  if(!BREAKDOWN) BREAKDOWN = await (await fetch(durl("org/"+CURRENT.code+".breakdown.json"))).json();
}

// The routes offered for the current GROUP + standard, read from the loaded
// breakdown: a group's activity-filtered routes (cancer_group_route) when a group
// is selected, else the all-cancers route dim. Empty when none are published
// (e.g. FDS28, which has no route dim).
function routesForContext(std){
  const dim = BREAKDOWN && BREAKDOWN.standards[std]; if(!dim) return [];
  if(GROUP!==null){ const m=dim.cancer_group_route && dim.cancer_group_route[GROUP]; return m?Object.keys(m):[]; }
  return dim.route ? Object.keys(dim.route) : [];
}
// Modalities published for an all-cancers route (route x modality combos exist).
function modsForRoute(std, route){
  const dim = BREAKDOWN && BREAKDOWN.standards[std];
  if(!dim || !dim.modality || !dim.combination || route===null) return [];
  return Object.keys(dim.modality).filter(m => (route+" | "+m) in dim.combination);
}
// Modality dropdown shows ONLY in the all-cancers view, on CMB31/CMB62, beneath a
// selected route that has a published modality level (the three-way doesn't exist,
// so it can never nest under a group).
function modalityApplicable(){
  return GROUP===null && CURRENT_STD!=="FDS28" && ROUTE!==null && modsForRoute(CURRENT_STD,ROUTE).length>0;
}

// Resolve the big-chart series for a (headline {standards}, breakdown file, std),
// composing GROUP -> ROUTE -> MOD. Returns null when the composed slice isn't
// published there (the chart then shows an explain-empty state / hides the line).
function resolveSeries(allStd, bdata, std){
  const base = allStd && allStd[std]; if(!base) return null;
  const dim = bdata && bdata.standards && bdata.standards[std];
  const wrap = s => s ? Object.assign({target:base.target,label:base.label}, s) : null;
  if(GROUP!==null){
    if(ROUTE!==null){ const gr=dim&&dim.cancer_group_route&&dim.cancer_group_route[GROUP]; return wrap(gr&&gr[ROUTE]); }
    const g=dim&&dim.cancer_group&&dim.cancer_group[GROUP]; return wrap(g);
  }
  if(ROUTE!==null && MOD!==null){ const c=dim&&dim.combination; return wrap(c&&c[ROUTE+" | "+MOD]); }
  if(ROUTE!==null){ const r=dim&&dim.route; return wrap(r&&r[ROUTE]); }
  return base;
}
function activeOrgSeries(){ return resolveSeries(CURRENT.standards, BREAKDOWN, CURRENT_STD); }
// --- rolling time-range window (big chart only) ---
// The first month visible under the current RANGE, given a series' full month list.
function firstVisibleMonth(months){
  const n=RANGE_MONTHS[RANGE];
  return (!isFinite(n) || months.length<=n) ? months[0] : months[months.length-n];
}
// Clip a series to months >= minMonth (months are "YYYY-MM", so string compare works).
// Returns the series unchanged when nothing is clipped or it's already empty.
function clipSeries(s, minMonth){
  if(!s || !s.months || !s.months.length || minMonth==null) return s;
  const i0=s.months.findIndex(m=>m>=minMonth);
  if(i0<=0) return s;
  const sl=a=>Array.isArray(a)?a.slice(i0):a;
  return Object.assign({}, s, {months:s.months.slice(i0), performance:s.performance.slice(i0),
    total:sl(s.total), data_status:sl(s.data_status), within_target:sl(s.within_target)});
}
function setRange(r){ if(RANGE===r || !(r in RANGE_MONTHS)) return; RANGE=r; renderBig(); }
function syncRangeUI(){ document.querySelectorAll(".rangebtn").forEach(b=>b.classList.toggle("active", b.dataset.range===RANGE)); }
// --- England comparison-line toggle ---
function setShowEngland(on){ if(SHOW_ENGLAND===on) return; SHOW_ENGLAND=on; renderBig(); }
function syncEnglandUI(){
  const wrap=document.getElementById("engwrap"), chk=document.getElementById("engchk");
  if(!wrap||!chk) return;
  wrap.hidden = CURRENT.isNational;   // no separate comparison line on the England tab
  chk.checked = SHOW_ENGLAND;
}
// National comparison must MATCH the active slice (like-for-like); null => hide it.
function activeNatSeries(){
  if(!sliceOnNow()) return NATIONAL.standards[CURRENT_STD]||null;
  return resolveSeries(NATIONAL.standards, NATIONAL_BREAKDOWN, CURRENT_STD);
}

// Keep the two breakdown controls (route + conditional modality) in sync with

  const std=CURRENT_STD;

  document.getElementById("routewrap").hidden = !hasRoutes;

/* ---- big chart ---- */
function renderBig(){
  syncBreakdownUI();   // keep the route/modality controls + hint in lockstep with state
  syncRangeUI();       // keep the time-range presets in lockstep with RANGE
  syncEnglandUI();     // keep the England toggle in lockstep (hidden on the England tab)
  // Oct-2023 comparability banner applies to CMB31/CMB62 only — hide it on FDS28
  // (the 28-day standard has no break), matching the in-chart marker.
  document.getElementById("breaknote").hidden = (CURRENT_STD==="FDS28");
  const sAll=CURRENT.standards[CURRENT_STD];
  const orgFull=activeOrgSeries();
  // Title carries the cancer group ALWAYS (incl. "All cancers"); the route/modality
  // are read from their own dropdowns, so they no longer clutter the title.
  document.getElementById("bigttl").textContent = sAll.label + " — " + groupText();
  // Subtitle: organisation name only — the standard is in the chart title and the
  // target value is on the chart's target line, so neither is lost here.
  document.getElementById("bigtag").textContent = CURRENT.isNational ? "England" : CURRENT.name;
  const box=document.getElementById("chartbox");
  const low=document.getElementById("lowrel");

  // Empty/absent slice for this org: explain rather than draw a blank chart.
  if(!orgFull || !orgFull.performance || !orgFull.performance.length){
    box.innerHTML=`<div class="emptyslice">No data published for this breakdown at this organisation.</div>`;
    document.getElementById("legend").innerHTML=""; low.hidden=true; return;
  }
  // Apply the rolling time-range window (fixed last-N months; "all" = no clip). The
  // org series sets the visible window; the England overlay is clipped to the SAME
  // first month so both align and the y-scale isn't pulled by out-of-window points.
  const minMonth = firstVisibleMonth(orgFull.months);
  const org = clipSeries(orgFull, minMonth);
  const nat = clipSeries(activeNatSeries(), minMonth);
  // England overlay only when the toggle is ON and this isn't the England tab. Setting
  // ACTIVE_NAT=null drops the line, its legend entry AND its pull on the y-scale, and the
  // export (which keys off ACTIVE_NAT) hides it too — one switch, every surface.
  ACTIVE_NAT = (SHOW_ENGLAND && !CURRENT.isNational && nat && nat.performance && nat.performance.length) ? nat : null;
  const hasLow = org.total.some(v=>(+v)<THRESH);
  // Legend on ONE line, mirroring the chart EXACTLY (line style + marker shape). The
  // org series + its two uncertain states come first, then a "|" boundary, then the
  // reference lines. Labels are organisation-only (the slice is named in the title).
  // Both uncertain states share the SAME lighter teal (--org-muted) and are told apart
  // ONLY by shape + dash: provisional = open CIRCLE + dashed; low-reliability = open
  // SQUARE + dotted. Normal/final keeps the strong solid teal + filled circle.
  const item = (sw,mk,sq,label)=>`<span class="lgitem">${legendSwatch(sw,mk,sq)}${label}</span>`;
  const org_ = item(`stroke="var(--org)" stroke-width="2.4"`,`fill="var(--org)"`,false,CURRENT.isNational?"England":"this organisation");
  const prov_ = item(`stroke="var(--org-muted)" stroke-width="1.8" stroke-dasharray="6 4" opacity="0.9"`,`fill="#fff" stroke="var(--org-muted)" stroke-width="1.6"`,false,"provisional");
  const low_ = item(`stroke="var(--org-muted)" stroke-width="1.8" stroke-dasharray="1.5 3" opacity="0.9"`,`fill="#fff" stroke="var(--org-muted)" stroke-width="1.6"`,true,`low reliability (n&lt;${THRESH})`);
  const nat_ = item(`stroke="var(--nat)" stroke-width="1.6" opacity="0.85"`,null,false,"England");
  const tgt_ = item(`stroke="var(--target)" stroke-width="1.4" stroke-dasharray="5 4"`,null,false,"target");
  const sep=`<span class="lgsep">&middot;</span>`, bar=`<span class="lgbar">|</span>`;
  // Order: org line, then low-reliability, then provisional, then the reference lines.
  const orgGroup=[org_].concat(hasLow?[low_]:[],[prov_]).join(sep);
  const refGroup=(ACTIVE_NAT?[nat_,tgt_]:[tgt_]).join(sep);
  document.getElementById("legend").innerHTML = orgGroup + bar + refGroup;
  box.innerHTML = bigSVG(org, ACTIVE_NAT) + `<div class="tip" id="tip"></div>`;
  attachTips(org);

  // Sub-threshold months are SHOWN but flagged, not hidden.
  if(hasLow){
    low.hidden=false;
    low.innerHTML=`&#9633; Open squares (and lighter-teal dotted segments) mark <em>final</em> months with fewer than ${THRESH} patients in scope — part of this organisation's series, but too thin to read as reliable. Months that are also provisional show as provisional instead.`;
  } else low.hidden=true;

  // Render hook: ?tip=N opens the tooltip on point N (from the end if negative).
  const t=+(new URLSearchParams(location.search).get("tip"));
  if(!Number.isNaN(t) && location.search.includes("tip=")){
    const i=t<0?org.performance.length+t:t; showTip(i, org);
  }
}

// A legend swatch: a short line in the entry's exact style, plus a marker where that
// series renders one — a circle by default, or a SQUARE when `square` is true (matches
// the low-reliability marker in the chart). Omit the marker for marker-less lines.
function legendSwatch(lineAttrs, markAttrs, square){
  const mark = !markAttrs ? ``
    : square ? `<rect x="10.5" y="2.5" width="7" height="7" ${markAttrs}/>`
             : `<circle cx="14" cy="6" r="3" ${markAttrs}/>`;
  return `<svg width="28" height="12" style="vertical-align:middle;margin-right:5px">`+
    `<line x1="1" y1="6" x2="27" y2="6" fill="none" ${lineAttrs}/>${mark}</svg>`;
}

// P.t reserves a header strip ABOVE the plotted data (the y-scale maps the highest
// value to y=P.t, so nothing is ever drawn above it) — used to park the
// "standards changed" annotation clear of the series wherever the data happens to sit.
// P.r reserves a RIGHT MARGIN for the "target NN.N%" label, so it sits level with the
// target line outside the plot, never covering the org/England series.
const BG={W:920,H:380,P:{l:46,r:76,t:36,b:30}};
function bigScales(s, nat){
  const xs=s.months, n=xs.length;
  const vals=s.performance.concat([s.target]);
  if(nat) vals.push(...nat.performance);
  let lo=Math.min(...vals), hi=Math.max(...vals);
  const pad=(hi-lo)*0.10||0.02; lo=Math.max(0,lo-pad); hi=Math.min(1,hi+pad);
  const {W,H,P}=BG;
  const x=i=>P.l+(i/(n>1?n-1:1))*(W-P.l-P.r);
  const y=v=>P.t+(1-(v-lo)/((hi-lo)||1))*(H-P.t-P.b);
  return {xs,n,lo,hi,x,y};
}
function bigSVG(s, nat){
  const {W,H,P}=BG;
  const sc=bigScales(s,nat); const {xs,n,lo,hi,x,y}=sc;
  // y gridlines: ~5 ticks on nice 5%/10% steps
  const span=hi-lo; const step=span>0.5?0.1:0.05;
  let g="";
  for(let v=Math.ceil(lo/step)*step; v<=hi+1e-9; v+=step){
    g+=`<line x1="${P.l}" y1="${y(v).toFixed(1)}" x2="${W-P.r}" y2="${y(v).toFixed(1)}" stroke="var(--grid)"/>`+
       `<text x="${P.l-6}" y="${(y(v)+3).toFixed(1)}" font-size="10" text-anchor="end" fill="var(--ink-soft)">${Math.round(v*100)}%</text>`;
  }
  // Oct-2023 standards-change marker: a vertical dashed rule at the comparability
  // break, on CMB31/CMB62 only (FDS28 has no break). Complements the banner below
  // the chart by marking exactly where the series stops being comparable. Shown ONLY
  // when the visible window includes data from BEFORE the break (xs[0] < break): once
  // the rolling window clears Oct-2023 every visible month is already comparable, so
  // the marker is dropped entirely (the banner below the chart still carries the note).
  let mark="";
  if(CURRENT_STD!=="FDS28" && META && META.comparability_break && xs[0] < META.comparability_break){
    const mi=xs.indexOf(META.comparability_break);
    if(mi>=0){
      const mx=+x(mi).toFixed(1);
      // Rule runs from the header strip down through the plot; the label sits ABOVE
      // the data region (in the strip), centred over the rule, so the dotted series
      // never weaves through it. Clamp the label x so it can't overrun either edge.
      const lx=Math.max(P.l+50, Math.min(W-P.r-50, mx));
      mark=`<line x1="${mx}" y1="${(P.t-18).toFixed(1)}" x2="${mx}" y2="${(H-P.b).toFixed(1)}" stroke="var(--ink-soft)" stroke-dasharray="4 3" stroke-width="1" opacity="0.7"/>`+
        `<text x="${lx.toFixed(1)}" y="${P.t-22}" font-size="9.5" text-anchor="middle" fill="var(--ink-soft)">standards changed</text>`;
    }
  }
  // target line + margin label.
  const ty=y(s.target);
  // Label sits in the right margin (see BG.P.r), vertically centred on the target line,
  // right-aligned to the SVG edge — clear of the plotted series at every chart.
  const tline=`<line x1="${P.l}" y1="${ty.toFixed(1)}" x2="${W-P.r}" y2="${ty.toFixed(1)}" stroke="var(--target)" stroke-dasharray="5 4" stroke-width="1.4"/>`+
    `<text x="${W-3}" y="${(ty+3.5).toFixed(1)}" font-size="10" text-anchor="end" fill="var(--target)">target ${fmt(s.target)}</text>`;
  // national overlay: a faint SOLID grey reference line, aligned by MONTH (robust
  // to slices that skip months). Deliberately solid, NOT dashed: "dashed" is
  // reserved for the org series' own states (provisional = lighter teal dashed,
  // low-reliability = muted teal dashed). When an org's series is mostly
  // provisional its line is almost entirely dashed teal; a dashed grey England
  // line beside it was near-indistinguishable. Solid grey vs dashed teal separates
  // them by BOTH colour and dash, even on a heavily-provisional org.
  let natpath="";
  if(nat){
    const nm={}; nat.months.forEach((mo,j)=>nm[mo]=nat.performance[j]);
    let d="",started=false;
    for(let i=0;i<n;i++){ const v=nm[xs[i]];
      if(v==null){started=false;continue;}
      d+=(started?"L":"M")+x(i).toFixed(1)+" "+y(v).toFixed(1)+" "; started=true; }
    if(d) natpath=`<path d="${d.trim()}" fill="none" stroke="var(--nat)" stroke-width="1.6" opacity="0.85"/>`;
  }
  // org series drawn PER SEGMENT so fragility reaches the line, not just markers.
  // Both uncertain states use the SAME lighter teal (--org-muted) and are told apart
  // by DASH alone; PROVISIONAL WINS over low-reliability (matches the markers):
  //  - a segment touching a provisional month is lighter-teal DASHED;
  //  - else a segment touching a sub-threshold month (n<10) is lighter-teal DOTTED (a
  //    fragile slice should look fragile — same principle as the funnel);
  //  - otherwise strong solid teal. (All-final, above-threshold => all solid, as before.)
  let line="";
  for(let i=0;i<n-1;i++){
    const provEdge=s.data_status[i]!=="final" || s.data_status[i+1]!=="final";
    const lowEdge=(+s.total[i])<THRESH || (+s.total[i+1])<THRESH;
    const d=`M${x(i).toFixed(1)} ${y(s.performance[i]).toFixed(1)} L${x(i+1).toFixed(1)} ${y(s.performance[i+1]).toFixed(1)}`;
    const style = provEdge ? `stroke="var(--org-muted)" stroke-width="1.8" stroke-dasharray="6 4" opacity="0.9"`
                : lowEdge ? `stroke="var(--org-muted)" stroke-width="1.8" stroke-dasharray="1.5 3" opacity="0.9"`
                          : `stroke="var(--org)" stroke-width="2.4"`;
    line+=`<path d="${d}" fill="none" ${style}/>`;
  }
  // x labels: adaptive step targeting ~8–10 labels regardless of window length (so a
  // 12-month window isn't sparse and a multi-year/"all" window doesn't collide). The
  // last month is always labelled; loop labels stop short of it to avoid a collision.
  let xl="";
  const lstep=Math.max(1,Math.ceil(n/8)), guard=Math.ceil(lstep/2);
  for(let i=0;i<n-guard;i+=lstep) xl+=`<text x="${x(i).toFixed(1)}" y="${H-8}" font-size="10" text-anchor="middle" fill="var(--ink-soft)">${monthLabel(xs[i])}</text>`;
  xl+=`<text x="${x(n-1).toFixed(1)}" y="${H-8}" font-size="10" text-anchor="end" fill="var(--ink-soft)">${monthLabel(xs[n-1])}</text>`;
  // Point markers. Per-point state is MUTUALLY EXCLUSIVE, provisional wins. Both
  // uncertain states share the SAME lighter teal (--org-muted) outline; shape alone
  // (+ the line dash) carries the distinction:
  //   provisional            => open CIRCLE
  //   low-reliability & final => open SQUARE
  //   normal final            => filled strong-teal circle
  // A point that is BOTH provisional and n<10 renders as provisional (circle), never a
  // square — so the square means specifically "final, but too few patients to trust".
  let pts="";
  for(let i=0;i<n;i++){
    const prv=s.data_status[i]!=="final", low=(+s.total[i])<THRESH;
    const cx=+x(i).toFixed(1), cy=+y(s.performance[i]).toFixed(1);
    const mk = prv ? `<circle class="pt" data-i="${i}" cx="${cx}" cy="${cy}" r="3.4" fill="#fff" stroke="var(--org-muted)" stroke-width="1.6"/>`
             : low ? `<rect class="pt" data-i="${i}" x="${(cx-3.1).toFixed(1)}" y="${(cy-3.1).toFixed(1)}" width="6.2" height="6.2" fill="#fff" stroke="var(--org-muted)" stroke-width="1.6"/>`
                   : `<circle class="pt" data-i="${i}" cx="${cx}" cy="${cy}" r="3.2" fill="var(--org)"/>`;
    pts+=mk+`<circle class="pt hit" data-i="${i}" cx="${cx}" cy="${cy}" r="11" fill="transparent"/>`;
  }
  return `<svg viewBox="0 0 ${W} ${H}" width="100%">${g}${mark}${natpath}${tline}${line}${xl}${pts}</svg>`;
}

function attachTips(s){
  const box=document.getElementById("chartbox");
  box.querySelectorAll(".pt").forEach(c=>{
    c.addEventListener("mouseenter",()=>showTip(+c.dataset.i, s));
  });
  box.addEventListener("mouseleave",hideTip);
}
function showTip(i, s){
  if(i<0||i>=s.performance.length) return;
  const tip=document.getElementById("tip"); if(!tip) return;
  const sc=bigScales(s, ACTIVE_NAT);
  const fin=s.data_status[i]==="final";
  tip.innerHTML=
    `${tipMonth(s.months[i])} &middot; <span class="pct">${fmt(s.performance[i])}</span><br>`+
    `${(+s.within_target[i]).toLocaleString()} of ${(+s.total[i]).toLocaleString()} `+
    `&middot; <span class="st ${fin?'fin':'prov'}">${fin?'final':'provisional'}</span>`;
  tip.style.left=(sc.x(i)/BG.W*100)+"%";
  tip.style.top =(sc.y(s.performance[i])/BG.H*100)+"%";
  tip.style.display="block";
}
function hideTip(){const t=document.getElementById("tip"); if(t)t.style.display="none";}

/* ---- expand modal ----
   We MOVE the live .bigpanel into the overlay rather than cloning it, so the
   route/modality dropdowns, tooltips, legend and download control are the same
   nodes and keep working — no duplicated IDs, no re-wiring. On close we put it
   back where it was. The SVG is width:100% so it simply scales up in the wider
   modal; a renderBig() refresh keeps tooltips/markers consistent in the new box. */
let EXPANDED=false, _panelHome=null;
function setExpandLabel(){ const b=document.getElementById("expandbtn");
  if(b) b.innerHTML = EXPANDED ? "&#10529; Exit full screen" : "&#10530; Expand"; }
function openModal(){
  if(EXPANDED) return;
  const panel=document.getElementById("bigpanel");
  _panelHome={parent:panel.parentNode, next:panel.nextSibling};
  document.getElementById("modalhost").appendChild(panel);
  document.getElementById("chartmodal").hidden=false;
  document.body.style.overflow="hidden";
  EXPANDED=true; setExpandLabel(); renderBig();
}
function closeModal(){
  if(!EXPANDED) return;
  const panel=document.getElementById("bigpanel");
  closePanel(); closeModPanel(); closeDlPanel();
  if(_panelHome) _panelHome.parent.insertBefore(panel, _panelHome.next);
  document.getElementById("chartmodal").hidden=true;
  document.body.style.overflow="";
  EXPANDED=false; setExpandLabel(); renderBig();
}
function toggleExpand(){ EXPANDED ? closeModal() : openModal(); }

/* ---- download chart as image (PNG / SVG) ----
   Builds a SELF-CONTAINED export SVG: a header strip (title + organisation +
   legend) above the live chart body, with the page's CSS custom properties
   resolved to literal colours and an explicit font-family — so the file renders
   correctly stand-alone and when rasterised to a canvas (where page :root vars
   and stylesheet rules do NOT apply). The chart body is taken from the on-screen
   <svg>, so the export captures EXACTLY what's displayed (current group / route /
   modality slice, all states, the in-chart "standards changed" marker, the
   right-margin target label and the axis). */
function closeDlPanel(){ const p=document.getElementById("dlpanel"); if(p)p.hidden=true;
  const b=document.getElementById("dlbtn"); if(b)b.setAttribute("aria-expanded","false"); }
function toggleDlPanel(){ const p=document.getElementById("dlpanel");
  if(p && !p.hidden){ closeDlPanel(); return; }
  if(p){ p.hidden=false; document.getElementById("dlbtn").setAttribute("aria-expanded","true"); } }

// Resolve var(--x) → literal value from :root (canvas rasterisation ignores CSS vars).
function resolvePalette(str){
  const cs=getComputedStyle(document.documentElement);
  return str.replace(/var\((--[a-z-]+)\)/g, (m,k)=>{ const v=cs.getPropertyValue(k).trim(); return v||m; });
}
// XML-escape text node content (titles/labels may contain & < >).
function xmlEsc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// Legend rebuilt as flat SVG (the on-page legend is HTML). Mirrors renderBig's
// item set/order/styles exactly. Monospace ⇒ width is predictable (~6.3px/char).
function exportLegendSVG(x0, baseline, isNationalOrg, hasNat, hasLow){
  const items=[];
  items.push({ln:'stroke="var(--org)" stroke-width="2.4"', mk:"circle", mka:'fill="var(--org)"', t:isNationalOrg?"England":"this organisation"});
  if(hasLow) items.push({ln:'stroke="var(--org-muted)" stroke-width="1.8" stroke-dasharray="1.5 3" opacity="0.9"', mk:"square", mka:'fill="#fff" stroke="var(--org-muted)" stroke-width="1.6"', t:"low reliability (n<"+THRESH+")"});
  items.push({ln:'stroke="var(--org-muted)" stroke-width="1.8" stroke-dasharray="6 4" opacity="0.9"', mk:"circle", mka:'fill="#fff" stroke="var(--org-muted)" stroke-width="1.6"', t:"provisional"});
  const refIdx=items.length;   // "|" boundary before the reference lines
  if(hasNat) items.push({ln:'stroke="var(--nat)" stroke-width="1.6" opacity="0.85"', mk:null, t:"England"});
  items.push({ln:'stroke="var(--target)" stroke-width="1.4" stroke-dasharray="5 4"', mk:null, t:"target"});
  let x=x0, out="";
  items.forEach((it,i)=>{
    if(i===refIdx){ out+=`<text x="${(x+2).toFixed(1)}" y="${baseline}" font-size="11" fill="var(--line)">|</text>`; x+=14; }
    out+=`<line x1="${x.toFixed(1)}" y1="${baseline-4}" x2="${(x+26).toFixed(1)}" y2="${baseline-4}" fill="none" ${it.ln}/>`;
    if(it.mk==="circle") out+=`<circle cx="${(x+13).toFixed(1)}" cy="${baseline-4}" r="3" ${it.mka}/>`;
    else if(it.mk==="square") out+=`<rect x="${(x+9.5).toFixed(1)}" y="${baseline-7.5}" width="7" height="7" ${it.mka}/>`;
    out+=`<text x="${(x+31).toFixed(1)}" y="${baseline}" font-size="11" fill="var(--ink-soft)">${xmlEsc(it.t)}</text>`;
    x += 31 + it.t.length*6.3 + 16;
  });
  return out;
}

function buildExportSVG(){
  const s=activeOrgSeries();
  const chartSvg=document.querySelector("#chartbox svg");
  if(!s || !s.performance || !s.performance.length || !chartSvg) return null;
  const {W,H}=BG, headerH=72;
  const isNat = !!ACTIVE_NAT;
  const hasLow = s.total.some(v=>(+v)<THRESH);
  const title=document.getElementById("bigttl").textContent;
  // Export subtitle title-cases the ALL-CAPS NHS org name (same humaniser as the
  // filename), preserving NHS/FT/ICB; the on-page .tag stays as published.
  const sub=CURRENT.isNational ? "England" : humanName(CURRENT.name);
  const serif=`font-family="'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif"`;
  const head =
    `<text x="16" y="26" font-size="18" font-weight="600" fill="var(--ink)" ${serif}>${xmlEsc(title)}</text>`+
    `<text x="16" y="44" font-size="12.5" fill="var(--ink-soft)" ${serif}>${xmlEsc(sub)}</text>`+
    exportLegendSVG(16, 62, CURRENT.isNational, isNat, hasLow);
  const svg=
    `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H+headerH}" `+
    `viewBox="0 0 ${W} ${H+headerH}" font-family="ui-monospace,Menlo,monospace">`+
    `<rect width="${W}" height="${H+headerH}" fill="var(--panel)"/>`+
    head+
    `<g transform="translate(0,${headerH})">${chartSvg.innerHTML}</g>`+
    `</svg>`;
  return resolvePalette(svg);
}

// NHS org names are ALL-CAPS in source; title-case for a readable filename while
// preserving common acronyms (NHS Foundation Trust → Airedale NHS Foundation Trust).
function humanName(name){
  const keep=new Set(["NHS","FT","ICB","UHB","CCG","HMP","STH"]), small=new Set(["AND","OF","THE","FOR"]);
  return name.split(/\s+/).map(w=>{ const u=w.toUpperCase();
    return keep.has(u) ? u : small.has(u) ? w.toLowerCase()
         : w.charAt(0).toUpperCase()+w.slice(1).toLowerCase(); }).join(" ");
}
// Filename, e.g. Airedale-NHS-Foundation-Trust-CMB62-Haematology.png
function exportName(ext){
  const parts=[CURRENT.isNational?"England":humanName(CURRENT.name), CURRENT_STD, GROUP||"All cancers"];
  if(ROUTE) parts.push(ROUTE);
  if(MOD) parts.push(MOD);
  const slug=parts.join("-").replace(/[^A-Za-z0-9]+/g,"-").replace(/^-+|-+$/g,"");
  return slug+"."+ext;
}
function saveBlob(blob, name){
  const url=URL.createObjectURL(blob), a=document.createElement("a");
  a.href=url; a.download=name; document.body.appendChild(a); a.click();
  a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1500);
}
function downloadChart(kind){
  const svg=buildExportSVG();
  if(!svg) return;
  if(kind==="svg"){ saveBlob(new Blob([svg],{type:"image/svg+xml;charset=utf-8"}), exportName("svg")); return; }
  // PNG: rasterise the export SVG to a 2× canvas (white background already painted).
  const scale=2, {W,H}=BG, headerH=72, w=W*scale, h=(H+headerH)*scale;
  const img=new Image();
  const url=URL.createObjectURL(new Blob([svg],{type:"image/svg+xml;charset=utf-8"}));
  img.onload=()=>{
    const c=document.createElement("canvas"); c.width=w; c.height=h;
    const ctx=c.getContext("2d"); ctx.scale(scale,scale);
    ctx.drawImage(img,0,0);
    URL.revokeObjectURL(url);
    c.toBlob(b=>{ if(b) saveBlob(b, exportName("png")); }, "image/png");
  };
  img.onerror=()=>{ URL.revokeObjectURL(url); };
  img.src=url;
}

init();
</script>
</body>
</html>
