<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Compare Providers — NHS Cancer Waiting Times Dashboard</title>
<style>
  :root{
    --ink:#11202b; --ink-soft:#4a5a64; --line:#d7e0e3; --paper:#fbfcfc;
    --panel:#ffffff; --org:#0f7d8c; --nat:#838f95; --target:#c8881d;
    --good:#2f7d4f; --bad:#b23b3b; --grid:#eef3f4; --warn:#b23b3b;
  }
  *{box-sizing:border-box}
  .vh{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;
    overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
  .pt{cursor:pointer}
  .pt:focus-visible{outline:2px solid var(--ink);outline-offset:1px}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;line-height:1.5}
  .wrap{max-width:1040px;margin:0 auto;padding:32px 24px 80px}
  header{border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:8px}
  h1{font-size:30px;margin:0 0 2px;letter-spacing:-.01em}
  .sub{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:12px;
    text-transform:uppercase;letter-spacing:.14em;color:var(--ink-soft)}
  nav{font-family:ui-monospace,Menlo,monospace;font-size:12px;margin-top:8px}
  nav a{color:var(--org);text-decoration:underline}
  .controls{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;margin:22px 0 6px}
  label{display:block;font-family:ui-monospace,Menlo,monospace;font-size:11px;
    text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);margin-bottom:5px}
  select{font:inherit;font-size:15px;padding:8px 10px;border:1px solid var(--line);
    border-radius:5px;background:#fff;min-width:min(240px,100%);max-width:calc(100vw - 48px)}
  .controls > div{max-width:100%}
  .period{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--ink-soft);margin:2px 0 0}
  .note{background:#fff7e8;border:1px solid #f0dcae;border-left:3px solid var(--target);
    padding:10px 13px;font-size:13.5px;color:#6b561f;border-radius:0 4px 4px 0;margin:14px 0}
  .note.fallback{background:#fbecec;border-color:#e6bcbc;border-left-color:var(--warn);color:#7a2b2b}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:8px;
    padding:16px 18px 12px;margin-top:20px}
  .card h3{margin:0 0 2px;font-size:17px}
  .card .meta{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--ink-soft);margin-bottom:6px}
  .legend{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--ink-soft);
    display:flex;gap:16px;flex-wrap:wrap;margin:4px 0 0}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
  .methods{font-size:12.5px;color:var(--ink-soft);margin:10px 0 0;max-width:78ch}
  .methods li{margin:2px 0}
  footer{margin-top:42px;border-top:1px solid var(--line);padding-top:16px;
    font-size:12.5px;color:var(--ink-soft)}
  a{color:var(--org)}
  svg text{font-family:ui-monospace,Menlo,monospace}
  .tip{position:fixed;pointer-events:none;background:var(--ink);color:#fff;font-size:12px;
    font-family:ui-monospace,Menlo,monospace;padding:5px 8px;border-radius:4px;opacity:0;
    transition:opacity .1s;max-width:260px;z-index:10}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>NHS Cancer Waiting Times Dashboard</h1>
    <div class="sub">England &middot; how providers compare (beta version)</div>
    <nav><a href="index.html">&larr; Per-organisation view</a></nav>
  </header>

  <div class="controls">
    <div><label for="std">Standard</label><select id="std"></select></div>
    <div><label for="bd">Breakdown</label><select id="bd"></select></div>
    <div><label for="scope">Compare across</label><select id="scope"></select></div>
    <div><label for="adj">Control limits</label><select id="adj">
      <option value="adj">Overdispersion-adjusted (default)</option>
      <option value="raw">Unadjusted (binomial)</option></select></div>
  </div>
  <div class="period" id="period"></div>

  <div class="note" id="breaknote"></div>
  <div class="note fallback" id="fallback" role="status" style="display:none"></div>

  <div class="card">
    <h3 id="funtitle">Funnel plot</h3>
    <div class="meta" id="funmeta"></div>
    <div id="funnel"></div>
    <div class="legend">
      <span><i class="dot" style="background:var(--org)"></i> below the England line</span>
      <span><i class="dot" style="border:1.6px solid var(--org);background:#fff"></i> above the England line</span>
      <span>larger point = further beyond the 95% / 99.8% limits</span>
      <span><i class="dot" style="border:1.2px solid var(--nat);background:#fff"></i> sub-threshold (funnel only)</span>
      <span><i class="dot" style="background:#cfd8db"></i> rest of England</span>
    </div>
  </div>

  <div class="card">
    <h3>Percentile view</h3>
    <div class="meta" id="pctmeta"></div>
    <div id="pct"></div>
  </div>

  <div class="card">
    <h3>Methods</h3>
    <ul class="methods" id="methods"></ul>
  </div>

  <footer id="foot"></footer>
</div>
<div class="tip" id="tip"></div>
<!-- Polite live region: announces the funnel/percentile view on each re-render. -->
<div id="live" class="vh" aria-live="polite" aria-atomic="true"></div>

<script>
const DATA="data/", C=DATA+"compare/";
let CAT=null, M=null;
// Optional ?org=<code> deep-link from a per-org page: pre-select that trust —
// scope the funnel to its NHS region and visually call out its point. Captured in
// init(); the scope is applied once (so the user can then change it freely).
let HILITE=null, hiliteScoped=false;
const fmt = p => (p*100).toFixed(1)+"%";
const xmlEsc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const escAttr = s => xmlEsc(s).replace(/"/g,"&quot;");
function announce(msg){ const l=document.getElementById("live"); if(!l) return;
  l.textContent=""; setTimeout(()=>{ l.textContent=msg; },30); }
const z95key="p95", z998key="p998";
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const fullMonth = m => {const[y,mm]=m.split("-");return MONTHS[+mm-1]+" "+y;};
const isoDate = iso => {const[y,m,d]=iso.slice(0,10).split("-");return (+d)+" "+MONTHS[+m-1]+" "+y;};
function footerHTML(META){
  const latest=fullMonth(META.months[META.months.length-1]), built=isoDate(META.built_at);
  return `Data source: NHS England Cancer Waiting Times statistics, published monthly and used here under the Open Government Licence v3.0. This dashboard is an independent tool and is not affiliated with or endorsed by NHS England.<br><br>`+
    `Data to ${latest}. Last updated ${built}. Figures for the most recent months are provisional and subject to revision.<br><br>`+
    `The 31-day and 62-day standards changed in October 2023; figures before that month are not directly comparable and are shown separately.`;
}

async function init(){
  CAT = await (await fetch(C+"index.json")).json();
  const META = await (await fetch(DATA+"meta.json")).json();
  document.getElementById("foot").innerHTML = footerHTML(META);
  document.getElementById("period").textContent =
    "Comparison basis: "+CAT.period_label+" · most recent "+CAT.window_months+" finalised months, numerators and denominators pooled.";
  // standards present in the catalogue, in canonical order
  const stds = Object.keys(CAT.standards).filter(s=>CAT.measures.some(m=>m.standard===s));
  const stdSel=document.getElementById("std");
  stds.forEach(s=>{const o=document.createElement("option");o.value=s;
    o.textContent=CAT.standards[s].split("(")[0].trim();stdSel.appendChild(o);});
  const scopeSel=document.getElementById("scope");
  [["England","England"]].concat(CAT.regions.map(r=>[r,r])).forEach(([v,t])=>{
    const o=document.createElement("option");o.value=v;o.textContent=t;scopeSel.appendChild(o);});
  // optional deep-link: ?std=CMB31&m=<measure-file>&scope=North West&org=<code>
  const q=new URLSearchParams(location.search);
  HILITE = q.get("org") || null;          // pre-select a trust (scope + highlight)
  stdSel.value = (q.get("std") && stds.includes(q.get("std"))) ? q.get("std") : "CMB62";
  stdSel.onchange=()=>{populateBreakdown();load();};
  document.getElementById("bd").onchange=load;
  scopeSel.onchange=render;   // scope + limit-mode changes are client-side only
  document.getElementById("adj").onchange=render;
  populateBreakdown();
  const bd=document.getElementById("bd");
  if(q.get("m") && [...bd.options].some(o=>o.value===q.get("m"))) bd.value=q.get("m");
  if(q.get("scope")) scopeSel.value=q.get("scope");
  if(q.get("adj")==="raw") document.getElementById("adj").value="raw";
  load();
}

function populateBreakdown(){
  const std=document.getElementById("std").value;
  const ms=CAT.measures.filter(m=>m.standard===std);
  const bd=document.getElementById("bd"); const prev=bd.value; bd.innerHTML="";
  const groups={all:[],cancer:[],route:[],modality:[]};
  ms.forEach(m=>groups[m.breakdown_type] && groups[m.breakdown_type].push(m));
  const addOpt=(parent,m,text)=>{const o=document.createElement("option");
    o.value=m.file;o.textContent=text;parent.appendChild(o);};
  if(groups.all[0]) addOpt(bd,groups.all[0],"All cancers");
  [["cancer","Cancer type"],["route","Referral route / stage"],["modality","Treatment modality"]].forEach(([k,lab])=>{
    if(!groups[k].length) return;
    const og=document.createElement("optgroup");og.label=lab;
    groups[k].sort((a,b)=>a.breakdown_value.localeCompare(b.breakdown_value))
      .forEach(m=>addOpt(og,m,m.breakdown_value));
    bd.appendChild(og);
  });
  // keep previous selection if still valid, else default to All cancers
  if([...bd.options].some(o=>o.value===prev)) bd.value=prev;
}

async function load(){
  const file=document.getElementById("bd").value;
  M = await (await fetch(C+file)).json();
  render();
}

function meta(m){return CAT.measures.find(x=>x.file===document.getElementById("bd").value);}

function render(){
  const scopeSel=document.getElementById("scope");
  // First render after an ?org= deep-link: scope the funnel to that trust's region
  // (unless the link also set an explicit scope). Once only — the user can re-scope.
  if(HILITE && !hiliteScoped){
    hiliteScoped=true;
    const t=(M.trusts||[]).find(x=>x.code===HILITE);
    if(t && t.region && CAT.regions.includes(t.region) && !new URLSearchParams(location.search).get("scope"))
      scopeSel.value=t.region;
  }
  let scope=scopeSel.value;
  const info=meta();
  // fallback: too few threshold-clearing trusts in the chosen region
  let fellBack=false;
  if(scope!=="England"){
    const nClear=(info.region_threshold_counts||{})[scope]||0;
    if(nClear < CAT.region_min_trusts){fellBack=true;}
  }
  const effScope = fellBack ? "England" : scope;
  const fb=document.getElementById("fallback");
  if(fellBack){fb.style.display="block";
    fb.textContent=`Too few trusts in ${scope} meet the reliability threshold (≥${CAT.threshold}) for "${M.label}" to compare meaningfully (${(info.region_threshold_counts||{})[scope]||0} of ${CAT.region_min_trusts} needed). Showing England instead.`;}
  else fb.style.display="none";

  document.getElementById("breaknote").innerHTML =
    "&#9888; The October 2023 standards change applies: comparison uses finalised data from "+CAT.period_label.split(",")[0]+", well after the break.";

  const adjusted = document.getElementById("adj").value==="adj";
  const phi = adjusted ? (M.overdispersion && M.overdispersion.phi || 1) : 1;
  const phiTxt = (M.overdispersion ? M.overdispersion.phi : 1).toFixed(1);

  const all=M.trusts;
  const inScope = effScope==="England" ? all : all.filter(t=>t.region===effScope);
  const rest = effScope==="England" ? [] : all.filter(t=>t.region!==effScope);

  document.getElementById("funtitle").textContent = `${M.label} — funnel plot`;
  document.getElementById("funmeta").textContent =
    `${effScope} · England line ${fmt(M.national.performance)} · `+
    `${adjusted?`overdispersion-adjusted limits (φ=${phiTxt})`:`unadjusted binomial limits`} · `+
    `${inScope.length} trusts (${inScope.filter(t=>!t.sub_threshold).length} above the ≥${CAT.threshold} threshold) · ${M.period_label}`;
  document.getElementById("funnel").innerHTML = funnelSVG(inScope, rest, phi)
    + funnelTableHTML(inScope, M.national.performance, M.z[z95key], M.z[z998key], phi);

  const clear = inScope.filter(t=>!t.sub_threshold).sort((a,b)=>a.performance-b.performance);
  document.getElementById("pctmeta").textContent =
    `${clear.length} threshold-clearing trusts in ${effScope}, ranked. Sub-threshold trusts are excluded here `+
    `(a tiny denominator gives a falsely-precise percentile) but still appear in the funnel.`;
  document.getElementById("pct").innerHTML = percentileSVG(clear) + pctTableHTML(clear);
  announce(`${M.label}, ${effScope}: funnel plot of ${inScope.length} trusts and percentile ranking of ${clear.length} threshold-clearing trusts updated. Data tables are available below each chart.`);

  const t=CAT.targets[M.standard];
  const nUnits = M.overdispersion ? M.overdispersion.n_units : 0;
  document.getElementById("methods").innerHTML = [
    `Control limits are anchored to the <b>national</b> distribution (England line ${fmt(M.national.performance)}), not recomputed within the region: an outlier always means an outlier relative to England. Limits are 95% and 99.8% (±2 and ±3 SD equivalents).`,
    adjusted
      ? `By default the limits include an <b>overdispersion adjustment</b> (after Spiegelhalter; φ=${phiTxt}, Winsorised across ${nUnits} reliable trusts), widening them to reflect genuine structural variation between trusts beyond simple random variation. Without it, plain binomial limits flag a large share of trusts as outliers because they assume all trusts are otherwise identical. Use the control above to see the unadjusted view.`
      : `Showing <b>unadjusted (binomial)</b> limits. These assume all trusts are otherwise identical and so flag a large share as outliers; the default overdispersion-adjusted view (φ=${phiTxt}) is usually more meaningful.`,
    `Point <b>fill</b> shows direction — filled is below the England line, hollow is above — and point <b>size</b> grows the further a trust sits beyond the limits. No colour means good or bad: a trust outside the limits is unusual given its volume, not, on its own, evidence of good or poor care.`,
    `Reliability threshold: a trust with fewer than ${CAT.threshold} patients pooled over ${M.period_label} is sub-threshold — shown in the funnel (where low volume widens the limits) but excluded from the percentile view.`,
    `Comparison pools ${CAT.window_months} finalised months (${M.period_label}) by summing numerators and denominators — not by averaging monthly percentages.`,
    t?`Operational target for this standard is ${fmt(t)} (faint amber line), shown for reference; it is not a control limit.`:``,
    fellBack?`Scope automatically widened from ${scope} to England (too few reliable trusts for this measure).`:``,
  ].filter(Boolean).map(s=>`<li>${s}</li>`).join("");
}

function limit(p0,z,n,phi){
  if(!(n>0)||!(p0>0&&p0<1)) return [0,1];   // sub-threshold / degenerate: limits span the axis
  const s=Math.sqrt((phi||1)*p0*(1-p0)/n);
  return [Math.max(0,p0-z*s),Math.min(1,p0+z*s)];
}

function funnelSVG(inScope, rest, phi){
  const W=1000,H=420,P={l:54,r:16,t:16,b:40};
  const p0=M.national.performance, z95=M.z[z95key], z998=M.z[z998key];
  const all=inScope.concat(rest);
  const maxN=Math.max(10,...all.map(t=>t.total));
  const tgt=CAT.targets[M.standard];
  // y-domain auto-zooms to the data (favours detail); padded, clamped to [0,1].
  const perfs=inScope.map(t=>t.performance);
  let ylo=Math.min(p0,...perfs), yhi=Math.max(p0,...perfs);
  if(tgt){ylo=Math.min(ylo,tgt);yhi=Math.max(yhi,tgt);}
  ylo=Math.max(0,ylo-0.04); yhi=Math.min(1,yhi+0.04);
  if(yhi-ylo<0.15){const c=(yhi+ylo)/2;ylo=Math.max(0,c-0.09);yhi=Math.min(1,c+0.09);}
  const x=n=>P.l+(Math.min(n,maxN)/maxN)*(W-P.l-P.r);
  const yraw=v=>P.t+(1-(v-ylo)/(yhi-ylo))*(H-P.t-P.b);
  const y=v=>Math.max(P.t,Math.min(H-P.b,yraw(v)));   // clamp into the plot band

  // limit curves (dispersion-aware via phi)
  const steps=120;
  const top95=[],bot95=[],top998=[],bot998=[];
  for(let i=1;i<=steps;i++){const n=Math.max(1,maxN*i/steps);
    const [l95,h95]=limit(p0,z95,n,phi),[l998,h998]=limit(p0,z998,n,phi);
    top95.push([x(n),y(h95)]);bot95.push([x(n),y(l95)]);
    top998.push([x(n),y(h998)]);bot998.push([x(n),y(l998)]);}
  const path=pts=>pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const curve998=`<path d="${path(top998)}" fill="none" stroke="var(--bad)" stroke-width="1" stroke-dasharray="2 2" opacity=".7"/>`+
                 `<path d="${path(bot998)}" fill="none" stroke="var(--bad)" stroke-width="1" stroke-dasharray="2 2" opacity=".7"/>`;
  const curve95=`<path d="${path(top95)}" fill="none" stroke="var(--target)" stroke-width="1" stroke-dasharray="4 3" opacity=".8"/>`+
                `<path d="${path(bot95)}" fill="none" stroke="var(--target)" stroke-width="1" stroke-dasharray="4 3" opacity=".8"/>`;
  // gridlines / axes
  let grid="";
  for(let k=0;k<=4;k++){const v=ylo+(yhi-ylo)*k/4;
    grid+=`<line x1="${P.l}" y1="${y(v)}" x2="${W-P.r}" y2="${y(v)}" stroke="var(--grid)"/>`+
          `<text x="${P.l-6}" y="${y(v)+3}" font-size="10" fill="var(--ink-soft)" text-anchor="end">${(v*100).toFixed(0)}</text>`;}
  for(let k=0;k<=4;k++){const n=maxN*k/4;
    grid+=`<text x="${x(n)}" y="${H-14}" font-size="10" fill="var(--ink-soft)" text-anchor="middle">${Math.round(n).toLocaleString()}</text>`;}
  grid+=`<text x="${(P.l+W-P.r)/2}" y="${H-1}" font-size="10.5" fill="var(--ink-soft)" text-anchor="middle">patients in period (denominator)</text>`;
  grid+=`<text transform="translate(13,${(P.t+H-P.b)/2}) rotate(-90)" font-size="10.5" fill="var(--ink-soft)" text-anchor="middle">% treated within standard</text>`;
  // centre + target
  const centre=`<line x1="${P.l}" y1="${y(p0)}" x2="${W-P.r}" y2="${y(p0)}" stroke="var(--nat)" stroke-width="1.5"/>`;
  const t=CAT.targets[M.standard];
  const tline=(t&&t>=ylo&&t<=yhi)?`<line x1="${P.l}" y1="${y(t)}" x2="${W-P.r}" y2="${y(t)}" stroke="var(--target)" stroke-width="1.2" stroke-dasharray="1 3" opacity=".6"/>`:"";
  // points. Single neutral hue. FILL = direction (filled below the England line,
  // hollow above); SIZE = how far beyond the limits. No good/bad colour scale.
  const HUE="var(--org)";
  // Emphasis halo + label for the ?org= deep-linked trust, so it stands out among
  // its peers. Drawn behind the point's own marker (caller appends the marker after).
  const hiDecor=(t,cx,cy)=>{
    if(t.code!==HILITE) return "";
    const lx=Math.min(cx+10,W-P.r-4), anchor=cx>W-120?"end":"start";
    return `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="9" fill="none" stroke="var(--target)" stroke-width="2"/>`+
           `<text x="${(cx>W-120?cx-12:cx+12).toFixed(1)}" y="${(cy-11).toFixed(1)}" font-size="10.5" font-weight="bold" fill="var(--ink)" text-anchor="${anchor}">${t.name.replace(/&/g,"&amp;")}</text>`;
  };
  const pt=(t,faint)=>{
    const cx=x(t.total),cy=y(t.performance);
    const d=JSON.stringify({n:t.name,p:t.performance,t:t.total,r:t.region}).replace(/"/g,'&quot;');
    const reg=t.region?`, ${t.region}`:"";
    if(faint)  // rest of England (region scope): faint grey context
      return `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="2.8" fill="#cfd8db" opacity=".5"/>`;
    if(t.sub_threshold){  // funnel-only, unreliable: muted hollow ring, no direction/emphasis
      const lab=`${t.name}: ${fmt(t.performance)}, ${t.total.toLocaleString()} patients${reg}, sub-threshold`;
      return hiDecor(t,cx,cy)+`<circle class="pt" data-d="${d}" tabindex="0" role="img" aria-label="${escAttr(lab)}" cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="3" fill="#fff" stroke="var(--nat)" stroke-width="1.1" opacity=".8"/>`;
    }
    const [l95,h95]=limit(p0,z95,t.total,phi),[l998,h998]=limit(p0,z998,t.total,phi);
    let lvl=0;
    if(t.performance<l998||t.performance>h998) lvl=2;
    else if(t.performance<l95||t.performance>h95) lvl=1;
    const r=[3.2,4.8,6.2][lvl], op=[.55,.92,1][lvl], sw=[1.1,1.5,1.9][lvl];
    const below = t.performance < p0;                  // direction
    const fill = below ? HUE : "#fff";                 // filled = below line, hollow = above
    const lab=`${t.name}: ${fmt(t.performance)}, ${t.total.toLocaleString()} patients${reg}, ${below?"below":"above"} the England line${lvl?(", beyond "+(lvl===2?"99.8%":"95%")+" limits"):", within limits"}`;
    return hiDecor(t,cx,cy)+`<circle class="pt" data-d="${d}" tabindex="0" role="img" aria-label="${escAttr(lab)}" cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${r}" fill="${fill}" stroke="${HUE}" stroke-width="${sw}" opacity="${op}"/>`;
  };
  const restPts=rest.map(t=>pt(t,true)).join("");
  const scopePts=inScope.map(t=>pt(t,false)).join("");
  const nClear=inScope.filter(t=>!t.sub_threshold).length;
  const aria=`Funnel plot: ${M.label}. ${inScope.length} trusts plotted by patient volume against percentage within standard, `+
    `relative to the England line at ${fmt(p0)} with 95% and 99.8% control limits. ${nClear} clear the reliability threshold. `+
    `Full figures are in the data table below the chart.`;
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" id="funsvg" role="img" aria-label="${escAttr(aria)}">`+
    `<title>${xmlEsc(M.label)} — funnel plot</title><desc>${xmlEsc(aria)}</desc>`+
    `${grid}${curve998}${curve95}${centre}${tline}${restPts}${scopePts}</svg>`;
}
// Visually-hidden table mirroring the trusts plotted in the funnel (in-scope only),
// with denominator + outlier status as TEXT.
function funnelTableHTML(inScope, p0, z95, z998, phi){
  let rows="";
  inScope.forEach(t=>{
    let status;
    if(t.sub_threshold) status="Sub-threshold (shown in funnel, excluded from ranking)";
    else{
      const [l95,h95]=limit(p0,z95,t.total,phi),[l998,h998]=limit(p0,z998,t.total,phi);
      let lvl="within control limits";
      if(t.performance<l998||t.performance>h998) lvl="beyond 99.8% limits";
      else if(t.performance<l95||t.performance>h95) lvl="beyond 95% limits";
      status=`${t.performance<p0?"Below":"Above"} the England line, ${lvl}`;
    }
    rows+=`<tr><td>${xmlEsc(t.name)}</td><td>${t.region||"—"}</td><td>${fmt(t.performance)}</td><td>${t.total.toLocaleString()}</td><td>${status}</td></tr>`;
  });
  return `<div class="vh"><table><caption>Data table: ${xmlEsc(M.label)} funnel plot — ${inScope.length} trusts in scope.</caption>`+
    `<thead><tr><th scope="col">Trust</th><th scope="col">Region</th><th scope="col">% within standard</th><th scope="col">Patients in period</th><th scope="col">Status</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function percentileSVG(clear){
  if(!clear.length) return `<p class="methods">No threshold-clearing trusts in this scope.</p>`;
  const W=1000,H=150,P={l:54,r:16,t:14,b:34};
  const vals=clear.map(t=>t.performance);
  let ylo=Math.min(...vals),yhi=Math.max(...vals);
  if(yhi-ylo<0.1){const c=(yhi+ylo)/2;ylo=c-0.05;yhi=c+0.05;}
  ylo=Math.max(0,ylo-0.02);yhi=Math.min(1,yhi+0.02);
  const n=clear.length;
  const x=i=>P.l+(n===1?0.5:i/(n-1))*(W-P.l-P.r);
  const y=v=>P.t+(1-(v-ylo)/(yhi-ylo))*(H-P.t-P.b);
  let grid="";
  [0,.25,.5,.75,1].forEach(q=>{const v=ylo+(yhi-ylo)*q;
    grid+=`<line x1="${P.l}" y1="${y(v)}" x2="${W-P.r}" y2="${y(v)}" stroke="var(--grid)"/>`+
          `<text x="${P.l-6}" y="${y(v)+3}" font-size="10" fill="var(--ink-soft)" text-anchor="end">${(v*100).toFixed(0)}</text>`;});
  // quartile markers along the rank axis
  [["P25",.25],["median",.5],["P75",.75]].forEach(([lab,q])=>{
    const idx=Math.floor(q*(n-1));const xx=x(idx);
    grid+=`<line x1="${xx}" y1="${P.t}" x2="${xx}" y2="${H-P.b}" stroke="#e3eaec" stroke-dasharray="2 3"/>`+
          `<text x="${xx}" y="${H-20}" font-size="9" fill="var(--ink-soft)" text-anchor="middle">${lab}</text>`;});
  grid+=`<text x="${(P.l+W-P.r)/2}" y="${H-4}" font-size="10.5" fill="var(--ink-soft)" text-anchor="middle">trusts ranked low → high performance</text>`;
  const dots=clear.map((t,i)=>{const d=JSON.stringify({n:t.name,p:t.performance,t:t.total,r:t.region}).replace(/"/g,'&quot;');
    const hi=t.code===HILITE;   // ?org= deep-linked trust: gold emphasis ring
    const halo=hi?`<circle cx="${x(i).toFixed(1)}" cy="${y(t.performance).toFixed(1)}" r="7" fill="none" stroke="var(--target)" stroke-width="2"/>`:"";
    const lab=`Rank ${i+1} of ${n}: ${t.name}, ${fmt(t.performance)}, ${t.total.toLocaleString()} patients${t.region?(", "+t.region):""}`;
    return halo+`<circle class="pt" data-d="${d}" tabindex="0" role="img" aria-label="${escAttr(lab)}" cx="${x(i).toFixed(1)}" cy="${y(t.performance).toFixed(1)}" r="3.4" fill="var(--org)" opacity=".8"/>`;}).join("");
  const aria=`Percentile view: ${n} threshold-clearing trusts ranked from lowest to highest percentage within standard. `+
    `Full figures are in the data table below the chart.`;
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" role="img" aria-label="${escAttr(aria)}">`+
    `<title>Percentile view</title><desc>${xmlEsc(aria)}</desc>${grid}${dots}</svg>`;
}
function pctTableHTML(clear){
  let rows=""; clear.forEach((t,i)=>{ rows+=`<tr><td>${i+1}</td><td>${xmlEsc(t.name)}</td><td>${t.region||"—"}</td><td>${fmt(t.performance)}</td><td>${t.total.toLocaleString()}</td></tr>`; });
  return `<div class="vh"><table><caption>Data table: percentile view — ${clear.length} threshold-clearing trusts ranked low to high.</caption>`+
    `<thead><tr><th scope="col">Rank</th><th scope="col">Trust</th><th scope="col">Region</th><th scope="col">% within standard</th><th scope="col">Patients in period</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

// shared hover tooltip
const tip=document.getElementById("tip");
document.addEventListener("mouseover",e=>{
  const c=e.target.closest&&e.target.closest(".pt"); if(!c)return;
  const d=JSON.parse(c.getAttribute("data-d"));
  tip.innerHTML=`${d.n}<br>${fmt(d.p)} · ${d.t.toLocaleString()} patients<br>${d.r}`;
  tip.style.opacity=1;
});
document.addEventListener("mousemove",e=>{
  if(tip.style.opacity==="1"){tip.style.left=(e.clientX+12)+"px";tip.style.top=(e.clientY+12)+"px";}
});
document.addEventListener("mouseout",e=>{if(e.target.closest&&e.target.closest(".pt"))tip.style.opacity=0;});
// Keyboard parity: show the same tooltip when a point receives focus, positioned at
// the point itself (the tip is position:fixed, so use viewport coordinates).
document.addEventListener("focusin",e=>{
  const c=e.target.closest&&e.target.closest(".pt"); if(!c)return;
  const d=JSON.parse(c.getAttribute("data-d"));
  tip.innerHTML=`${d.n}<br>${fmt(d.p)} · ${d.t.toLocaleString()} patients<br>${d.r||""}`;
  const r=c.getBoundingClientRect();
  tip.style.left=(r.left+r.width/2+12)+"px"; tip.style.top=(r.top+12)+"px"; tip.style.opacity=1;
});
document.addEventListener("focusout",e=>{if(e.target.closest&&e.target.closest(".pt"))tip.style.opacity=0;});

init();
</script>
